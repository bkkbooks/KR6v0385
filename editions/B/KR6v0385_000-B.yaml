front:
  text: 寒山唱和序佛祖慧命相沿雖貝笈梵函喝棒顧盼作用不同其體一也唐世韻語盛行村稚爨婦能解歌吟寒拾二老溷跡於中移商換徵積成篇什大要憫世癡迷沈沒于利欲生死之海而不知止息故閒言以挑冷語以諷痛言如罵正語如經縱橫反覆斜側正視無非為此大事毋令斷絕耳余嘗題其端曰掃盡塵沙轉見沙千年苕帚白生花閭丘只認豐干舌落葉飄零何處家嗣後擬其作者代有而步武全韻銖兩不殊者則楚石琦公一人今石樹隱公繼之矣蓋江河愈下可涕可悲事有甚於古時援手無力忍俊不禁乃以舊時機杼重翻花樣雖文彩頓新而絲簆相接綿密無間余喜而為詠曰糞掃堆頭無價珠癡人覿面漫躊躕千年長夜黑如漆忽發神光是此書世有讀者無俟豐干閭丘而後知其人木叉道人鄭龍采法名弘辨合刻楚石石樹二大師和三聖詩集序寒山拾得豐干三大士不由閭丘之口傳之孰知為文殊普賢彌陀之化身也嘗誦其詩或喜或悲或笑或罵究其所以然者無非使人徵善棄惡而已也斯後楚石石樹二公何其人輒敢和之亦嘗誦其詩亦喜亦悲亦笑亦罵雖時移事易究其和之所以亦無非徵善棄惡而已也其詞轉意宛悉亦如之嘗錯雜于三大士篇若不可辨然則二公者抑天台水牯牛之化蹟耶抑三大士願力未諧而再來應身耶不然何其聲氣之同如此夫楚石石樹既不下三大士之風吾輩又豈甘遜閭丘之志哉閭丘錄詩于石壁高巖老樹之上余則錄詩于空江瓢笠之內因編次之遂成古今合璧不敢私祕一肘公與天涯有道共之於是稽首以偈贊云稽首三聖楚石石樹三聖去遙楚石已逝五百年來聲韻幾墜唯我石翁唱導末世繼寒拾風承豐干智追挽古音筆花生瑞黃海天台去來何處文殊古院國清破寺短句長謌不落文字宸生何緣得聞開示廣陵道上負笈隨侍每見揮毫因錄編次合刻流通永傳盛事曰三曰五是一是二請著眼看快追雲駛虞山社弟子許宸翰法名且住和天台三聖詩敘虛空可畫乎雖不可畫而天地山川烟雲人物細而醯雞太末大而剎海浮幢太虛空中一物不受而實無一物不包也然求圖畫虛空打破大唐難遇好手有大脫空漢寒山拾得并豐干三人掣風掣顛炊熱國清冷竈唐言梵語題徧天台山巖石壁有好事者編成書冊目之為詩而實於三人實際分中不留剩迹也數百年後有法鐙慈受中峰諸老從而擬之已是犀角生紋月邊帶暈矣又有楚石琦老從而步韻不免虛空釘橛我石樹法兄以烟霞道骨丘壑心胸高掛鉢囊放浪黃海雖胸中空洞無物而咀嚼寒山諸人言句忍俊不禁復為步和一字一句如入萬山深處荒寒幽悄使人毛髮俱慄又若高山望海靜夜聞鐘曠若發蒙猛地痛省較之楚石可謂後來居上壓倒元白而實石兄實際分中亦不留點墨歸於圖畫虛空而已雖然如是三十年後有人沾著字句如塗毒鼓聞者皆喪莫謂紙墨文字中遂無殺人刀活人劍也真具眼人急著眼覰住西江雲居晦山法弟戒顯題於鄧峰禪室和三聖詩自序嘗讀三聖詩聲韻似出尋常意義都超格外故愚者讀之易曉智者讀之益深三聖之詩至矣追夫三聖示迹寒巖或悲或笑或舞或歌或書石壁或書樹皮為狀不一為語甚奇人皆目之為風顛漢也已自豐干饒舌閭丘傳頌而後世知其為三聖詩然不知其詩曷為而作也不知作者之意而讀之何為蓋三聖以憫世之熱腸為惺世之冷語其意以諸經之旨玄微未能旦晚解悟故以觸景即物之句為引迷入悟之門使智者得魚忘筌愚者因象覓意智者去浮辭而證實際愚者由粗言而悟直指此三聖憫世惺世之深意也擬作者如法燈慈受中峰諸祖而賡韻者惟國朝楚石梵琦禪師余初讀之不知三聖之為楚石楚石之為三聖再讀之恍若三聖之參前楚石之卓立也是時凡遇佳山勝水好風朗月目之所見意之所會輒不禁長吟短詠獨於三聖詩未敢輕和癸未罷參高臥黃海復見三聖詩讀之爽然曰此余向所欲和者也去余三百年之上有楚石去楚石五百年之上有三聖時移事易風韵若合符節彼在盛唐國初者猶有世道人心之歎今時人心逾薄生兹不辰所見所聞又當超三聖楚石而快言之隨拈三聖韻而為石樹詩不逾月而和竟乃囅然曰吾願在二十年前而酬於二十年後吾事畢矣但未知於三聖憫世惺世之旨有當乎否也姑錄此藏之名山俟後五百年或復有人焉讀之和之耳石樹道人通隱題于黃海石筍峰前天台三聖詩集序唐朝議大夫使持節台州諸軍事守刺史上柱國賜緋魚袋閭丘胤撰詳夫寒山子者不知何許人也自古老見之皆謂貧人風狂之士隱居天台唐興縣七十里號為寒巖時來國清寺寺有拾得知食堂尋常收貯殘飯菜滓於竹筒內寒山若來即負之而去或長廊徐行叫喚快活獨言獨笑時僧捉罵打趁乃駐立撫掌呵呵大笑良久而去且狀如貧子形貌枯悴一言一偈理合其意沈而思之隱況道情凡所啟言洞該玄默乃樺皮為冠布裘破弊木屐履地是故至人遯迹同類化物或長廊唱詠唯言咄哉咄哉三界輪迴或於村墅與牧牛子而歌笑或逆或順自樂其性非哲者安可識之矣胤頃受丹丘薄宦臨途之日乃縈頭痛遂召日者醫治轉重乃遇一禪師名豐干言從天台山國清寺來特此相訪乃命救疾師乃舒容而笑曰身居四大病從幻生若欲除之應須淨水時乃持淨水上師師乃噀之須臾祛殄乃謂胤曰台州海島嵐毒到日必須保護胤乃問曰未審彼地當有何賢堪為師仰師曰見之不識識之不見若欲見之不得取相乃可見之寒山文殊遯迹國清拾得普賢狀如貧子又似風狂或去或來在國清寺庫院走使廚中著火言訖辭去胤乃進途至任台州不忘其事到任三日後親往寺院躬問禪宿果合師言乃令勘唐興縣有寒山拾得是否時縣申稱當縣界西七十里內有一巖巖中古老見有貧士頻往國清寺止宿寺庫中有一行者名曰拾得胤乃特往禮拜到國清寺乃問寺眾此寺先有豐干禪師院在何處并拾得寒山子現在何處時僧道翹答曰豐干禪師院在經藏後即今無人住得每有一虎時來此吼寒山拾得二人現在廚中僧引胤至豐干禪師院乃開房唯見虎迹乃問僧寶德道翹禪師在日有何行業僧曰豐干在日唯攻舂米供養夜乃唱歌自樂遂至廚中竈前見二人向火大笑胤便禮拜二人連聲喝胤自相把手呵呵大笑叫喚乃云豐干饒舌饒舌彌陀不識禮我何為僧徒奔集遞相驚訝何故尊官禮二貧士時二人乃把手走出寺乃令逐之急走而去即歸寒巖胤乃重問僧曰此二人肯止此寺否乃令覓訪喚歸寺安置胤乃歸郡遂製淨衣二對香藥等持送供養時二人更不返寺使乃就巖送上而見寒山子乃高聲喝曰賊賊退入巖穴乃云報汝諸人各各努力入穴而去其穴自合莫可追之其拾得迹沈無所乃令僧道翹尋其往日行狀唯於竹木石壁書詩并村墅人家廳壁上所書文句三百餘首及拾得於土地堂壁上書言偈並篹集成卷胤棲心佛理幸逢道人乃為讚曰菩薩遯迹示同貧士獨居寒山自樂其志貌悴形枯布裘弊止出言成章諦實至理凡人不測謂風狂子時來天台入國清寺徐步長廊呵呵撫指或走或立喃喃獨語所食廚中殘飯菜滓吟偈悲哀僧俗咄捶都不動搖時人自恥作用自在凡愚難值即出一言頓祛塵累是故國清圖寫儀軌永劫供養長為弟子昔居寒山時來兹地稽首文殊寒山之士南無普賢拾得定是聊申讚歎願超生死天台山國清禪寺三隱集記豐干禪師唐貞觀初居天台國清寺剪髮齊眉衣布裘人或問佛理止答隨時二字常唱道乘虎出入眾僧驚畏無誰語有寒山子拾得者亦不知其氏族時謂風狂子獨與師相親寒居止唐興縣西七十里寒巖以是得名拾因師至赤城道側聞兒啼聲問之云孤棄於此乃名拾得攜至寺付庫院後庫僧靈熠令知食堂香燈忽登座與佛像對盤而餐復於聖僧前呼曰小果熠告尊宿等易令廚內滌器常日齋畢澄濾殘食菜滓以筒盛之寒來即負之而去寒容貌枯悴布襦零落以樺皮為冠曳大木屐時至寺或廊下徐行或廚內執爨或混處童牧或時叫噪望空嫚罵或云咄哉咄哉三界輪迴僧以杖逼逐即撫掌大笑一日問師古鏡不磨如何照燭曰冰壺無影像猨猴探水月曰此是不照燭也更請師道曰萬德不將來教我道什麼寒拾俱作禮師謂寒曰汝與我遊五臺即我同流若不與我去非我同流曰我不去師曰汝不是我同流寒問汝去五臺作什麼曰我去禮文殊曰汝不是我同流師尋獨入五臺逢一老翁問莫是文殊否曰豈有二文殊及作禮忽不見後回天台而化寒因眾僧炙茄以茄串打僧背一下僧回首寒持串云是什麼僧云這風顛漢寒示傍僧曰你道這箇師僧費卻多少鹽醬趙州到天台行見牛迹寒曰上座還識牛麼此是五百羅漢遊山州曰既是羅漢為什麼作牛去寒曰蒼天蒼天州呵呵大笑寒曰笑作什麼州曰蒼天蒼天寒曰這小廝兒卻有大人之作溈山來寺受戒與拾往松門夾道作虎吼三聲溈無對寒曰自從靈山一別迄至于今還相記麼溈亦無對拾拈拄杖曰老兄喚這箇作什麼溈又無對寒曰休休不用問他自從別後已三生作國王來總忘卻也拾掃地寺主問姓箇什麼住在何處拾置叉手而立主罔測寒搥胸曰蒼天蒼天拾問汝作什麼寒曰豈不見道東家人死西家助哀因作舞笑哭而出又於莊舍牧牛歌詠叫天曰我有一珠埋在陰中無人別者眾僧說戒拾驅牛至倚門撫掌微笑曰悠悠哉聚頭作相這箇如何僧怒呵云下人風狂破我說戒拾笑曰無嗔即是戒心淨即出家我性與汝合一切法無差驅牛出乃呼前世僧名牛即應聲而過復曰前生不持戒人面而畜心汝今招此怨恨於何人佛力雖然大汝辜於佛恩護伽藍神僧廚下食每每為鳥所耗拾杖抶之曰汝食不能護安能護伽藍乎神附夢于合寺僧曰拾得打我詰旦說夢一一無差視神像果有所損驚異牒申郡縣郡謂賢士遯迹菩薩應身號拾得賢士初閭丘胤將牧丹丘頭疾醫莫能愈遇禪師名豐干言自天台來謁使君告之病師曰身居四大病從幻生若欲除之應須淨水索器呪水噀之立愈閭丘異之乞言示此去安危之兆師曰記謁文殊普賢此二菩薩見之不識識之不見若欲見之不得取相國清寺執爨滌器寒山拾得是也閭丘到任三日至國清問此寺有豐干禪師否寒山拾得復是何人僧道翹對曰豐干舊址在經藏後今𨵙無人矣寒山拾得尚處僧廚閭丘入師房止見虎迹復問在此作何行業翹曰唯事負舂供僧閒則諷詠入廚尋訪寒拾見於竈前向火撫掌大笑閭丘致拜二人連聲呵叱執手復大笑曰豐干饒舌饒舌彌陀不識禮我何為相攜出松門自此不復入寺閭丘歸郡送淨衣香藥到巖寒高聲喝曰賊賊遂入巖石縫中且曰報汝諸人各各努力石縫忽合後有僧采薪南峰距寺東南二里遇一梵僧持錫入巖挑鎖子骨曰取拾得舍利乃知入滅于此因號巖為拾得閭丘俾道翹尋訪遺迹於林間葉上得寒所書辭頌及村墅人家三百餘首拾亦有詩數十首題石壁間云按舊序二人呵叱自執手大笑閭丘歸郡遣送衣藥與夫挑鎖子骨等語乃知寒山不執閭丘手閭丘未嘗至寒巖拾得亦出寺門二里許入滅今傳燈所錄誤矣因筆及此以俟百世君子淳熙十六年歲次己酉孟春十有九日住山禹穴沙門志南謹記詩歌若人何鄉何姓氏隋季唐初毫傑士屠龍技癢無所施東守西征徒萬里天厭荒淫羖䍽君大地山河移姓李滿眼清賢登廟堂書生分合山林死朅來寒山三十年不堪回首紅塵市遊戲千巖萬水間駕言足躡龜毛履不飢不采山中薇渴來只飲山中水風瓢戞擊惱幽懷移家屢入深雲裏貧衣縷足風霜不礙寒潭瑩無滓時訪豐干看拾公漠外形骸忘爾汝擾擾人寰螘慕羶哂然一笑寒生齒擬將大筏渡迷津咳唾煙雲生筆底銀鉤灑灑落巖阿至今護守煩山鬼世無相馬九方臯但從肥瘦求形似詩成眾口浪雌黃往往視之為下俚近來一二具眼人頗憐名字遺青史雲袞霞纓妙語言謂與騷章無異旨寥寥千載無人知偶逢知者惟如此知與不知於我乎何與此其所以得為寒山子富哉三聖詩妙處絕言迹擬之唯法燈和之獨楚石十虛可銷殞一字難改易灌頂甘露漿何人不蒙益楚石和尚和三聖詩集晟藏主編次求余題之因用韻以寓擊節之意云至正十八年十月初三日南堂遺老清欲書帖陸放翁與明老改正寒山子詩帖有人兮山陘雲袞兮霞纓秉芳兮欲寄路漫兮難征心惆悵兮狐疑蹇獨立兮忠貞此寒山子所作楚辭也今亦在集中妄人竄改附兹至不可讀放翁書寄天封明公或以刻之山中也朱晦庵與南老索寒山子詩帖熹啟上清泉老每往兒輩附問黃壻得之聞久時得書也出師表未暇寫得催寫得轉寄去未晚也寒山詩刻成幸早見寄有便只附至臨安趙節推廳託其尋便必無不達渠黃巖人也熹啟上國清南公禪師方丈首楞嚴云我滅度後勑諸菩薩應身生彼末法之中作種種形度諸輪轉終不自言我真菩薩洩佛密因唯除命終陰有遺付天台三聖其斯之謂與舊集載朱晦翁與國清住持手帖勸其重刻寒山詩板有刊成當見惠之語得非以其辭理淳正有合於儒道耶西齋老人屬和灼見三聖之心其言無今昔之異華藏原明禪師刻梓以傳使三聖人撫掌於大寂定中西齋為不滅矣其法利無窮可得而思議哉洪武戊寅冬僧錄司左善世吳門大佑刊三聖諸賢詩辭總集序宣情達事世教有取於詩吾宗聖賢高蹈遠視邈然矣亦彷人情近習琢為文句蓋憫物之心不可遏也抑將激誘於道奚啻宣情達事流翫百世珠玉之擬哉觀夫豐干寒拾三聖所唱楚石琦公之和韻皆痛快激烈斥妄警迷山中天靈義首座服膺有素願繡梓以傳焉且篹舊本諸名公序帖及三隱集記系之又以佛國白禪師所作文殊指南贊詞勝理詣永明壽禪師布衲雍鏡中圓前後山居唱和之什暨古德十牛頌并諸歌偈切於風礪有裨益於世者比次成帙勸率善信陳智寶賈福常俾諸眾緣併與刊行謁言為弁因謂醫方萬品求對治而休海寶千般得如意而足披此集者驀然逗著一言半句撲落眼屑粲發心華方信聖賢憫物之心誠有在也是則助揚激誘微天靈之勣吾誰與歸永樂丙申夏結制前一日僧錄司右闡教兼住鍾山靈谷幻居比丘淨戒天台三聖詩流布人間尚矣古今擬詠非一而未有次其韻者余不揆凡陋輒撰次和之殆類摸象耳雖然象之耳亦豈外於似箕之言哉歲丙申中秋四明比丘梵琦頓首
