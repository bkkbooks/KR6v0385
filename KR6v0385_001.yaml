纓祿富貴百千般貪榮不知辱拏馬滿宅舍金銀盈帑屋癡福暫時扶埋頭作地獄忽死萬事休男女當頭哭不知有禍殃前路何疾速家破冷颼颼食無一粒粟凍餓苦悽悽良由不覺觸寒人生一世間那箇無天祿但只貪富貴未嘗憂寵辱酒思常滿杯錢恨不盈屋吾佛有勸戒妻子真牢獄生聚暫為歡死別長嘷哭泉路動即至火輪來甚速相逢盡冰炭所啖非菽粟都由在世時軟滑生淫觸楚卿相在朝廷居高薦厚祿胡為體至貪沒世受憂辱汝欲構園亭萬民為卸屋汝欲求珍珠百姓為下獄汝欲饗肥甘一羣為慟哭不知福易終輪回相報速刀山是臥牀鐵丸易精粟警戒語諄諄愚者不感觸石上人心猛利一聞便知妙中流心清淨審思云甚要下士鈍暗癡頑皮最難裂直得血淋頭始知自摧滅看取開眼賊鬧市集人決死尸棄如塵此時向誰說男兒大丈夫一刀兩段截人面禽獸心造作何時歇寒修心有善惡報土開粗妙末上得菩提最先明旨要謗而不信者頭作七分裂懺悔福乃生歸依罪尋滅自心即是佛更欲從誰決若待無常到此時何所說祖師示方便言語太直截且向三句參喫茶珍重歇楚我觀了道人無心求至妙今之無明流鬬諍為玄要惜矣蚩蚩氓不顧石火裂尋常戰兩頭而苦於生滅一礙一切礙去就未能決要知佛祖原如幻如實說山頂雲盡消海底流俱截所以入生死生死心已歇石我有六兄弟就中一個惡打伊又不得罵伊又不著處處無奈何耽財好淫殺見好埋頭愛貪心過羅剎阿爺惡見他阿娘嫌不悅昨被我捉得惡罵恣情掣趁向無人處一一向伊說汝今須改行覆車須改轍若也不信受共汝惡合殺汝受我調伏我共汝覓活從此盡和同如今過菩薩學業攻爐冶鍊盡三山鐵至今靜恬恬衆人皆讚說寒叵耐貪瞋癡使我長發惡三賊暗埋藏一朝親捉著心王苦相勸令我莫打殺元是自家親孳生遍塵剎逆之即煩惱順之即喜悅譬如猴被縛縛緊將繩掣掣繩繩轉緊緩緩容渠說渠說非我罪總是君行轍所好君欲生所惡君欲殺君作我受名豈願隨君活從此請辭去不然同布薩我聞頻點頭契若石引鐵可以書諸紳處處逢人說楚嬰兒初生時不識善與惡蒙蒙天地間寸心無耽著惜哉伊父母真氣代殘殺情愛深河海罪過等塵剎黃葉作金錢止啼為歡悅鑿開貪欲根金飾肘上掣忠孝節義因誓不早陳說豫教失端方性成蹈故轍伏機當發張恣意但行殺很戾入神明邪淫為快活衰亡醞釀深血肉黷菩薩武火肆燔燒應無堅固鐵何如向道專功德信難說石我見世間人堂堂好儀相不報父母恩方寸底模樣缺負他人錢蹄穿始惆悵個個惜妻兒爺娘不供養兄弟似怨家心中常悒快憶昔少年時求神願成長今為不孝子世間多此樣買肉自家噇抹觜道我暢自逞說嘍囉聰明無益當牛頭努目瞋始覺時已嚮擇佛燒好香揀僧歸供養羅漢門前乞趁卻閒和尚不悟無為人從來無相狀封疏請名僧䞋錢三兩樣雲光好法師安角在頭上汝無平等心聖賢俱不降凡聖皆混然勸君休取相寒昨見一羣僧袈裟福田相清晨入市鄽倣佛如來樣開口論貨財妒人生怨悵師資甚失禮犬馬猶能養既已傲同學彌令心怏怏行時又慢老坐處各爭長飲酒無威儀純成俗人樣醉來即鼾睡睡起嫌未暢依前詣酒家更脫衣衫當問法法不知問書書在嚮遊談誑檀越假善求供養又有一類僧置産為高尚枷鎖不離門長官時問狀卻嫌坐禪侶專作死模樣汲黯譬積薪後來者居上安危自業招禍福非天降臨死壞爛時不如猪狗相楚千聖不傳妙本來無形相黃檗脅下拳此是慈悲樣大事喪考妣心中時悵悵一朝悟徹時方見真孝養孝養既無愧心王何悒怏發言同石立積德俱年長今日之所為後來之榜樣哀哉像季秋學道不通暢法未悟千差事無行一當外貌殊可觀內心果何嚮空耗住持糧兼欺檀越養出入近公候虛名自高尚些毫不遂心撫按投公狀從古迄至今祖師無此樣覆惡佛不許悔過淨名上苟不發深省奚免見升降照膽有神銅難逃種種相石有鳥五色文棲梧食竹實徐動合威儀鳴中施呂律昨來何以至為吾暫時出儻聞絃歌聲作舞欣今日寒雞鶋至魯門空嗉不復實雖有鐘鼓音未知宮商律人憐文仲愚謂是嘉瑞出朱鳥在南方來儀定何日楚重明鳥至祥飼以瓊膏實雞體玄黃文鳳鳴天地律曾為皇漢來本自月支出令我懷佳音翹翹企此日石昔日極貧苦夜夜數他寶今日審思量自家須營造掘得一寶藏純是水晶珠大有碧眼胡密擬買將去余即報渠言此珠無價數寒最切不在身至貴不在寶天堂任我為地獄從誰造眼橫鼻直者各自有心珠玉兔與金烏朝夕任來去只是一珠光變現河沙數楚大道誰賢愚各懷一至寶不知早自珍乃欲更相造亦如醉臥人顛忘衣裏珠終朝向外尋海北山南去忽得悔從前奔走路無數石一生慵懶作憎重只便輕他家學事業余持一卷經無心裝標軸來去省人擎應病則說藥方便度衆生但自心無事何處不惺惺寒貪夫何日足苦擔幾時輕未讀生天論那知了義經一頭和酒浸雙手把錢擎月算分毫聚年推息利生無常旦夕至只恐不惺惺楚住山塵纍遠自覺一身輕不作有為事但看無字經經箋非玉版萬古許誰擎當下了其義何勞智計生凝眸天地外非寂亦非惺石我見出家人不入出家學欲知真出家心淨無繩索澄澄絶玄妙如如無倚託三界任縱橫四生不可泊無為無事人逍遙實快樂寒捨家得出家有學成無學四壁冷蕭蕭六門空索索已除桑下戀聊向橘中託天地即幻化山林同旅泊笙歌與鼓鐘非吾所謂樂楚吾人想出塵無習小乘學若作不淨觀白骨空罥索將謂數息是氣散終無託縱想入鄰虛究竟難棲泊到此放身命方得大安樂石昨到雲霞觀忽見仙尊士星冠月帔橫盡云居山水余問神仙術云道若為比謂言靈無上妙藥心神祕守死待鶴來皆道乘魚去余乃返窮之推尋勿道理但看箭射空須臾還墜地饒你得仙人恰似守尸鬼心月自精明萬象何能比欲知仙丹術身內元神是莫學黃巾公握愚自守擬寒白首學神仙黃冠稱道士甚欲登蓬萊奈何阻弱水肉身無兩翅難與鴻鵠比年老丹不成書多術猶祕玉棺竟未下金節徒思去大患緣有身長生諒非理縱饒八萬劫寧免歸死地在漢淮南王求仙為廁鬼爭如學空寂舉世絶倫比詎見人民非休論城郭是太虛常湛然名相誰能擬楚世上無真人且多僞練士貪癡障道門不解火中水扇羽巾華陽神仙高自比道經尚未探邪術亦深祕大藥詎人間空使尋山去縱負盈車來丹成非極理張皇說解尸如空必墜地銅石說點金如人必作鬼奇哉唐六如擔水河頭比鼎敗寒灰飛精華何處是神仙不愛財切莫錯相擬石余鄉有一宅其宅無正主地生一寸草天垂一滴露火燒六個賊風吹黑雲雨子細尋本人布裹真珠爾寒來從無量劫畢竟誰為主緑水與青山分明全體露只將這個法普施雱𩃱雨聞者心花開塵塵剎剎爾楚夢遊天地間須辨其中主月色自孤明心光常獨露默時走迅雷言處灑甘雨萬物發陽春如是運轉爾石傳語諸公子聽說石齊奴僮僕八百人水碓三千區舍下養魚鳥樓上吹笙竽伸頭臨白刃癡心為緑珠寒人間好男子總與婦為奴色膽充三界貪心滿八區高堂堆蜀錦密座促齊竽死去埋荒冢猶含口內珠楚豪為換馬者吝即守錢奴將相車千乘王侯第一區空餘金谷酒孰奏商邱竽死學賈胡去剖身藏美珠石何以長惆悵人生似朝菌那堪數十年新舊凋零盡以此思自哀哀情不可忍奈何當奈何脫體歸山隱寒其下有積蛇是中饒毒菌啜羹必致死染指無不盡瞋障亦復然所以修慈忍但取懷抱空何妨市鄽隱楚神仙嘗採芝勿採山中菌奚止傷昆蟲食者同歸盡愚哉貪肥鮮違戒何殘忍不如守道人飯蔬成大隱石縷關前業莫訶今日身若言由冢宅個是極癡人到頭君作鬼豈令男女貧皎然易解事作麼無精神寒利益衆生事莊嚴百福身修成現在業報得未來人第一哀憐苦偏多賑濟貧非惟他受樂亦足自怡神楚獨游無伴侶萬里只孤身苦路懷慈母荒山念道人見聞寧鄙陋操履益堅貧瘦影臨蒼瀑徘徊照入神石我見黃河水凡經幾度清水流如箭急人世若浮萍癡屬根本業無明煩惱坑輪回幾許劫只為造迷盲寒不假摩尼力何由濁水清心如難死草境似易生萍菩薩愚癡障聲聞解脫坑凡夫著聲色歷劫受聾盲楚莫厭聲塵鬧勿耽山色清少時同夏木老去即秋萍理盡聞思路知深見識坑茫茫陷身者開眼卻如盲石二儀既開闢人乃居其中迷汝即吐露醒汝即吹風惜汝即富貴奪汝即貧窮碌碌羣漢子萬事由天公寒有一如意寶祕在形山中濕暖歸水火堅動還地風推尋不可得受用了無窮俗物都蹉過喚他作天公楚四邊不見表況復論其中世界水交火人身地接風各還何處是偶合若為窮昂首貫寒暑默然存至公石余勸諸稚子急離火宅中三車在門外載你免飄蓬露地四衢坐當天萬事空十方無上下來往任西東若得個中意縱橫處處通寒譬如一眼龜墮在大海中出入無量歲隨波若萍蓬一朝值浮木而不得其空南去又向北西來復往東忽然相撞著處處是圓通楚傀儡何人掣顛顛光影中霜清摧晚韭朔吹捲寒蓬沫聚鷗移夢星沈魚啖空全迷天極北不再日華東黽勉聲塵裏怡然得大通石可歎浮生人悠悠何日了朝朝無閒時年年不覺老總為求衣食令心生煩惱擾擾百千年去來三惡道寒法界露堂堂心王明了了本來無聖凡安得有生老慎勿起貪瞋從此添熱惱還栽地獄業未出修羅道楚鼎鼎百年間世人多未了我身如此閒我性何曾老夢幻契無心境緣安得惱有時坐草庵有日歌山道石時人尋雲路雲路杳無蹤山高多險峻澗闊少玲瓏碧嶂前兼後白雲西復東欲知雲路處雲路在虛空寒欲與雲為伴雲多不定蹤澗將山作侶山亦少玲瓏只是形兼影相隨西又東何須求富貴富貴盡成空楚孤鶴高飛去白雲何處縱澗茅徒偃蹇山竹自玲瓏雪老陰崖北輝生碧海東須臾光氣滿朗朗照晴空石寒山棲隱處絶得雜人過時逢林內鳥相共唱山歌瑞草聯溪谷老松枕嵯峨可觀無事客憩歇在巖阿寒輪蹄俱不到猿鶴自相過每聽樵夫唱時聞牧豎歌山根雲漫漫洞口石峨峨一片莓苔地青松繞四阿楚空巖花正發輕策每常過流水如人語鳴泉和我歌蒼苔供細軟老石立嵯峨意外吞無極胸中小太阿石五嶽俱成粉須彌一寸山大海一滴水吸入其心田生長菩提子遍蓋天中天語汝慕道者慎莫繞十纏寒西南上峨頂東北至臺山菩薩所住處衆生良福田福田遍大地住處同一天智慧即菩提愚癡自縈纏楚吸盡西江水移開人我山方知母産地此是祖家田落落無為境悠悠自在天未曾起一念那有識情纏石無衣自訪覓莫共狐謀裘無食自采取莫共羊謀羞借皮兼借肉懷歎復懷愁皆緣義失所衣食常不周寒光武萬乘主子陵一羊裘寧知堯舜讓未掩巢由羞社稷從爾好簞瓢非我愁夷齊竟餓死天下亦宗周楚三秋猶袗綌五月尚披裘自是高人分寧為草服羞時窮貧足樂道喪易成愁我輩當如是天心日月周石自羡山間樂逍遙無倚託逐日養殘軀閒思無所作時披古佛書往往登石閣下窺千尺崖上有雲盤礡寒月冷颼颼身似孤飛鶴寒問我何所樂山林可栖託澗泉處處流松籟時時作夜月點明燈朝雲吐飛閣六窗正虛寂萬象同磅礡仙子海上來俱騎一隻鶴楚此生何所為山水於焉託少讀華亭書老和寒山作拋卻七尺竿高臥千巖閣月來通嘯歌雲過足盤礡一望浩無涯松邊馴海鶴石我見轉輪王千子常圍繞十善化四天莊嚴多七寶七寶鎮隨身莊嚴甚妙好一朝福報盡猶若棲蘆鳥還作牛領蟲六趣受業道況復諸凡夫無常豈長保生死如旋火輪回似麻稻不解早覺悟為人枉虛老寒吾聞鹿腳仙草舍藤蘿繞清淨無欲身莊嚴不貪寶後因淫女過貪彼顏色好竟作蝜蝂蟲俱成鴛鴦鳥自兹失神力由是落魔道爾輩居華堂身心豈可保婦人如雨雹能壞垂成稻相勸早回頭紅顏鏡中老楚二僧談禪理諸天皆圍繞飛花雜彩雲垂語成珍寶少頃論荒唐品評姿色好情動如獼猴心飛類鵠鳥頓失大神通而墮於邪道紛然鬼使隨慧命不可保譬彼植秀禾禾秀不實稻春夏不加工無復歎秋老石平野水寬闊丹丘連四明仙都最高秀羣峰聳翠屏遠遠望何極矹矹勢相迎獨標海隅外處處播嘉名寒山高數千仞夜半日輪明嵂崒含雲氣玲瓏列畫屏林華開又落谷鳥送還迎久不至城市無人識姓名楚事近轉難悟思窮翻易明掀開道理障撤去見知屏本地風光露故鄉山色迎要知親切意父母未安名石我見世間人生而還復死昨朝猶二八壯氣胸襟士如今七十過力困形憔悴卻似春日花朝開夜落爾寒自古到如今何人獨不死燒香誦道經願學長生士宿骨非神仙塵容轉憔悴飄蓬八十秋彈指須臾爾楚除非身不生方得至無死釋老尚遺形況乎中下士若還取相求神識徒憔悴道德能現前長生訣乃爾石回聳霄漢外雲裏路岧嶤瀑布千丈流如鋪練一條下有棲心窟橫安定命橋雄雄鎮世界天台名獨超寒天台山最高遠望勢苕嶤葉吐千千樹花開萬萬條黃金堆作寺白玉削為橋不假神通力凡夫豈易超楚天台列河漢望處轉岧嶤江水流三浙雲門路一條臨崖看瀑布踏雪過溪橋偶記寒山草高吟性自超石盤陀石上坐溪澗冷淒淒靜玩偏嘉麗虛巖蒙霧迷怡然憩歇處日斜樹影低我自觀心地蓮華出淤泥寒深林人膽栗絶澗水聲淒桂樹山中滿桃花洞裏迷靜聞鐘遠近閒望月高低不覺成華髮何煩降紫泥楚石瘦苔痕古山深木葉淒兼秋聲帶別向夕望成迷夢與林鐘靜風來野梵低觀心遊物表不復異雲泥石隱士遁人間多向山中眠青蘿疏麓麓碧澗響聯聯騰騰且安樂悠悠自清閒免有染世事心淨如白蓮寒緑竹林中坐青松樹下眠山禽聽不絶石室近相聯有意招人隱無心學我閒宗雷在何處冷落半池蓮楚石筍為清供石牀堪穩眠瓦鐺碧澗近茅屋白雲聯念佛嗤多事著書消大閒興來時卓筆攜杖上青蓮石寄語食肉漢食時無逗遛今生過去種未來今日修只取今日美不畏來生憂老鼠入飯甕雖飽難出頭寒我有一間屋往來成逗遛方當未壞時且可隨緣修椽梠既差脫崩摧何足憂同袍儻見念相送荒山頭楚三界為鄽舍隨緣且逗遛悟真真不立知幻幻宜修但了一生夢勿擔千載憂法身本無恙日照青山頭石自從出家後漸得養生趣伸縮四肢全勤聽六根具褐衣隨春冬糲食供朝暮今日懇懇修願與佛相遇寒胡為起一念不覺隨六趣若了心體空方知法身具靈山非遠近曠劫真旦暮生死甚疲勞今朝忽然遇楚山居餐飲外事事成真趣種火繼禪燈汲泉供茗具栽花宜候時了道不愁暮日月迭往來心光常與遇石五言五百篇七字七十九三字二十一都來六百首一例書巖石自誇云好手若能會我詩真是如來母寒張公問李老郭五答鄭九識滅生死離四人皆肯首善財但合掌妙德遙伸手歷劫始相逢奇哉諸佛母楚天一不成孤二偶翻作九蜈蚣勞百足菩薩摩陀首毒性及慈心驢腳並佛手更追威音王還有老祖母石世事何悠悠貪生未肯休研盡大地石何時得歇頭四時凋變易八節急如流為報火宅主露地騎白牛寒世事一何悠星星放下休枯樁臨倒日惡貫結交頭有識成三界無貪涸四流歸來滿天月不復見人牛楚人生事悠悠老大不知休昔日蒼梧曲今年青海頭舟車如寶筏歲月過泉流一事無消息將鞭叱石牛石嘗聞漢武帝爰及秦始皇俱好神仙術延年竟不長金臺既摧折沙丘遂滅亡茂陵與驪嶽今日草茫茫寒衣冠從五帝耕稼本三皇去古日已遠為君年尚長後來耽富貴非久就淪亡安得淳風在貪心益渺茫楚北窗風有意開卷問羲皇我道無今古人情有短長滄桑多變故王霸幾消亡悲慨知何益東流送渺茫石憶得二十年徐步國清歸國清寺中人盡道寒山癡癡人何用疑疑不解尋思我尚自不識是伊爭得知低頭不用問問得復何為有人來罵我分明了了知雖然不應對卻是得便宜寒茫茫三界中火宅豈可歸修習戒定慧滅除貪瞋癡貪瞋癡本空戒定慧絶思了此即是佛非佛誰能知行住及坐臥蕭然何所為衆生不請友日用無緣知萬象共酬酢縱橫皆合宜楚此身無住著無住即云歸世上有家者翻然笑我癡有家便有苦無住卻無思此意問誰解寒山片石知偶逢狂放輩一任好施為無故罵而去還他三不知熙怡成解脫逆順總相宜石語你出家輩何名為出家奢華求養活繼綴族姓家美舌甜脣觜諂曲心鈎加終日禮道場持經置功課爐燒神佛香打鐘高聲和六時學客舂夜夜不得臥只為愛錢財心中不脫灑見他高道人卻嫌誹謗罵驢屎比麝香苦哉佛陀耶寒往古出家者出離三界家近來出家者返入他人家繼拜別父母重重貪愛加放錢作衣資置産收租課結伴噇魚肉同聲相唱和厚茵高廣牀未夜先眠臥肚裏濁如泥外頭將水灑童奴稍失意未免惡瞋罵乃是羅剎黨假號僧伽耶楚曾無善根者急難求出家亦為無食者勉強投僧家信基既不實真誨從何加口佛心不佛人前講功課覓錢餧豕羊生涯勤應和遇酒便狂呼翻經當枕臥有時賽神明忍將雞血灑是神其享之必掃跡而罵假使佛出世無法可救耶石又見出家兒有力及無力上上高節者鬼神欽道德君王分輦坐諸候拜迎逆堪為世福田世人須保惜下下低愚者詐現多求覓濁濫即可知愚癡愛財色著卻福田衣種田討衣食作債稅牛犁為事不忠直朝朝行弊惡往往痛臀脊不解善思量地獄苦無極一朝著病纏三年臥牀席亦有真佛性翻作無明賊南無佛陀耶遠遠求彌勒寒僧寺收民田官司驗物力好閒呼小名豈復尊大德常住歸自己師資懷五逆法王好基業費蕩真可惜拋卻自家寶走向傍邊覓枷鎖亂縱橫都緣耽酒色饅頭著菜豏抵死不肯食百種邪思量詐云我心直命終入地獄鐵棒敲驢脊灌口用洋銅其時悔無極從今便覺悟脅不至牀席打破無字關屏除煩惱賊卻觀大千界掌上庵摩勒楚荷負法門事能具堅忍力從來師資間所重者道德今也不其然師資互為逆不如鄉裏兒師道尚珍惜既稱悟道人法眼盲無覓用人多輕狂行事不真色營豐華麗衣遠致珍奇食夢囈語言標自是為指直何曾點石頭莫謂望肩脊虛消信施珠罔報恩之極須臾病苦纏懊惱占牀席末後成懡㦬終為敗德賊吾儕當龜鑑深思復銘勒石寒巖深復好無人行此道白雲高岫閒青嶂孤猿嘯我更何所親暢志自宜老形容寒暑遷心珠甚可保寒覓心不得心我道無可道枕石山中眠披雲月下嘯昨來顏如玉今旦身已老寄語富家翁田園為誰保楚獨坐興不孤每復懷斯道至靜聞蟻喧高吟引虎嘯巖前石髮威屋角雲頭老憑檻摩蒼松歲寒斯永保石本志慕道倫道倫常獲親時逢社源客每接話禪賓談玄月明夜探理日臨晨萬機俱泯迹方識本來人寒有識乃同倫無情亦我親煙霞方外侶風月坐中賓影散蒲萄夕香吹菡萏晨談玄常浩浩聽者未逢人楚石屋靜無倫悠然影獨親一峰能作主衆壑不辭賓月出松當晝風生蘭發晨清歌天籟嘯響答古來人石元非隱逸士自號山林人何曾蒙幘帛且愛裹疏巾道有巢許操恥為堯舜臣獼猴罩帽子學人避風塵寒不作空王子甘為膺道人辭家剃鬚髮娶婦著冠巾賈本牛羊質湯休蟣蝨臣明珠不自惜一旦棄灰塵楚吾道隨時去孤村同俗人長穿遵業履兼著子雲巾卿相難為客王候豈得臣何如罹世網尺璧委埃塵石自古諸哲人不見有長存生而還復死盡變作灰塵積骨如毗富別淚成海津唯有空名在豈免生死輪寒百二十年人渾無一個存白頭都入土滄海竟揚塵有酒且飲濕無錢空咽津煎膠粘日去未解截風輪楚世相若流轉空花妄見存真心長在月道眼不容塵一喝山川走片言河海津天樞定物象寸鐵運風輪石今日巖前坐坐久煙霞收一道清溪冷千尋碧嶂頭白雲朝影靜明月夜光浮身上無塵垢心中那更憂寒內外了無物乾坤俱不收草衣復草屨山腳又山頭地暖白雲起池寒紅葉浮有身必敗壞敗壞亦何憂楚楓林萬葉下靜聽秋聲收水落見山腳雲開露石頭蒼深烟影亂虛白月華浮安有輕塵集朗懷捐百憂石千雲萬水間中有一閒士白日遊青山夜歸巖下睡倏爾過春秋寂然無塵纍快哉何所依靜若秋江水寒由來隱淪客自號清虛士春暖且閒行月明多不睡身從物外樂事絶毫端纍坐石看雲山餐松飲溪水楚經緯竟無緒超超為野士都拋世上憂但向山中睡理亂聽諸天夢醒安所纍走窮華頂峰飲盡桃源水石勸你休去來莫惱他閻老失腳入三塗粉骨遭千搗長為地獄人永隔今生道勉你信余言識取衣中寶寒方哀西舍兒又哭東鄰老去矣喚不回惄焉心似搗前時畫棟宅今日青松道客養千金軀臨化消其寶楚壽算謂無窮形神嗟已老雲光衣裏收溪響夢中搗緑草布郊原白楊吹墓道大聲呼不還埋沒天然寶石世間一等流誠堪與人笑出家弊己身誑俗將為道雖著離塵衣衣中多養蚤不如歸去來識取心王好寒下士聞我說堂堂拍手笑老𥅆曾有言不笑不為道頑若水浸石忙如火烘蚤歸依佛法僧始信吾家好楚夾山早上堂道吾京口笑今日無知人鼓舌亂談道燈焰上飛蛾褲襠裏跳蚤若是為法人惜取眉毛好石高高峰頂上四顧極無邊獨坐無人知孤月照寒泉泉中且無月月自在青天吟此一曲歌歌終不是禪寒吾家在何許乃在白雲邊上有數株松下有一曲泉最好明月夜方當素秋天鳴蟲與落葉共說無生禪楚坐來閒不了詩想到崖邊動筆花飛硯煎茶鶴聽泉日華籠翠樹潭碧繪青天人境尚雙遣何容比量禪石有個王秀才笑我詩多失云不識蜂腰仍不會鶴膝平側不解壓凡言取次出我笑你作詩如盲徒詠日寒我和寒山詩有得復有失覓句行掉頭揮毫坐搖膝依他聲律轉自我胸襟出法法皆現前當空一輪日楚高吟非作詩我心無得失全刺寒山心不搖楚石膝風從華頂來泉向天根出炯炯照余懷何殊冷竈日石我住在村鄉無爺亦無娘無名無姓第人喚作張王並無人教我貧賤也尋常自憐心的實堅固等金剛寒虛空一大宅般若所生娘身是神通藏心為自在王千般歸有壞一悟出無常對境逢緣處惟柔可勝剛楚恩乳深於海多生非一娘悲傷堆古骨慚愧老空王節孝寧虛幻禪心非斷常敢將浮脆事言行證金剛石寒山出此語此語無人信蜜甜足人嘗黃檗苦難吞順情生喜悅逆意多瞋恨但看木傀儡弄了一場困寒諸佛成菩提始從一念信未曾有一物不被無常吞無常吞不得閻老不敢恨更擬問如何但言今日困楚所以為凡夫祇因心不信生死如鈎綸情迷自暗吞悠悠何所歸忽忽有遺恨俊哉破網羅毋為境緣困石我見人轉經依他言語會口轉心不轉心口相違背心真無委曲不作諸纏蓋但且自省躬莫覓他替代口中作得主是知無內外寒我今欲說禪不可作禪會謂渠是即觸謂渠非即背背觸二俱掃洞庭湖無蓋如何繼先德將此傳後代白月上林端清風起天外楚世情付罔聞禪道轉不會塵剎既無方此中安有背堂堂獨露天無底亦無蓋并不知有古況復論當代悠然臥翠林得句在言外石寒山唯白雲寂寂絶埃塵草座山家有孤燈明月輪石牀臨碧沼虎鹿每為鄰自羡幽居樂長為象外人寒空中一片雲地上一微塵未絶身心纍難逃生死輪行尋雞足隱去與鷲頭鄰可證僧為寶堪將法化人楚雨過溪聲急青山絶點塵應機聞水碓閲理悟空輪長嘯忽忘世高操不見鄰相承千古意必竟待何人石鹿生深林中飲水而食草伸腳樹下眠可憐無煩惱繫之在華堂肴膳極肥好終日不肯嘗形容轉枯槁寒飢餐嶺上松困藉巖前草動即行數步靜時無一惱自從削髮來便愛居山好大抵出家人灰寒而木槁楚空巖抱古松下長靈芝草白鹿忘機來體之無苦惱青猿摘果還且比人心好以類推其情我願澤枯槁石花上黃鶯子關關聲可憐美人顏似玉對此弄鳴弦玩之能不足眷戀在齠年花飛鳥亦散灑淚春風前寒春風入花柳紅緑正堪憐有女嬌顏色無心理管弦空房掩病枕逝水惜雕年化作孤飛燕還來舊閣前楚芳草好顏色美人生可憐甫聞歌緑綺忽愴斷朱弦野冢增新土荒丘哭少年寧無驚視聽快悟未生前石棲遲寒巖下偏訝最幽奇攜籃采山茹挈籠摘果歸蔬齊敷茅坐啜啄食紫芝清沼濯瓢鉢雜和煮稠稀當陽擁裘坐閒讀古人詩寒吾廬信可樂水石清且奇渺渺沿流去騰騰信腳歸千尋蔭嘉木五采拾靈芝天闊雲霧散月明星宿稀無人同夜坐自詠寒山詩楚山林宜朴素意不愛珍奇瓦瓮擔泉去竹籃挑菜歸水田栽紫芋松地布青芝籬下花常滿座中人故稀眼前無限景隨筆採為詩石昔日經行處今復七十年故人無來往埋在古冢間余今頭已白猶守片雲山為報後來子何不讀古言寒天上一晝夜人間五百年非生非死法不有不無間血比大海水骨如毗富山從今休歇去只這是誰言楚至人出世上一日勝千年流俗雖百歲無益於民間流俗遺臭名至人德如山我常讀典雅因之重立言石我見利智人觀著便知意不假尋文字直入如來地心不逐諸緣意根不妄起心意不生時內外無餘事寒睡時喚作夢覺即呼為意日夜不得閒皆曰自心地心地本空寂妄緣從何起譬如已破瓶無復作瓶事楚柏子已成佛西來豈有意達磨未折蘆個個踏實地鈍置哂蕭梁是非風自起何如立雪人以竟一切事石身著空花衣足躡龜毛履手把兔角弓擬射無明鬼寒達磨返流沙遺下一隻履踢出腳尖頭嚇殺閻羅鬼楚睦州忠孝事草縛十圍履山寇望而退德風驚野鬼石君看葉裏花能得幾時好今日畏人攀明朝待誰掃可憐嬌豔情年多轉成老將世比於花紅顏豈長保寒借問山中人居山有何好春花滿路開秋葉隨風掃獨唱誰與和長年不知老無榮亦無辱此樂真可保楚嘉樹滿山中休誇枝葉好花開有客攀花落無人掃風雨蕩為塵聲光容易老英雄及早年努力本根保石縱你居犀角饒君帶虎睛桃枝折作醫蒜殼取為瓔暖腹茱萸酒空心枸𣏌羹終歸不免死浪自覓長生寒用酒為肝膽將財作眼睛頭風添艾炷腋氣帶香瓔座客千金膳家人七寶羹惟言無後世只要樂今生楚吾人愛道德如護兩丸睛束篾能忘世繩衣勝珮瓔泉炊鸚鵡粒香泛雪霞羹何必錢三萬一杯當半生石為人常喫用愛意須慳惜老去不自由漸被他催斥送向荒山頭一生願虛擲亡羊罷補牢失意終無極寒孝子人所嗟逆兒天不惜妻孥受愛憐父母遭訶斥簷水高下流機梭往來擲汝兒如汝為何不報罔極楚一朝聞道後夕死又何惜忠孝亟躬行君親毋面斥友于尚石交師道豈雲擲四句銘中心深操之至極石寒山無漏巖其巖甚濟要八風吹不動萬古人傳妙寂寂好安居空空離譏誚孤月夜長明圓日常來照虎丘兼虎溪不用相呼召世間有王傅莫把同周邵我自遁寒巖快活長歌笑寒昔有婆羅門修身失其要年衰得一男首面殊娟妙不久乃傾逝悲啼衆所誚去尋閻羅王欲索文簿照何遽奪吾兒奔走來相召其子為老翁汝今年已邵暫時寄汝家癡騃令人笑楚石雲得我性久默思玄要雅志生清音高情寄墨妙花嬌不待譽花落何勞誚佛火燃孤明松烟薄四照泉光挂遠天山響相應召寡欲道真長才明德益邵閒閒物外人悠悠契微笑石沙門不持戒道士不服藥自古多少賢盡在青山腳寒若無衆生病何用諸佛藥一藏非正文連篇皆注腳楚古有妙醫方醍醐雜毒藥悟服化千身迷飲走四腳石有人笑我詩我詩合典雅不煩鄭氏箋豈用毛公解不恨會人稀只為知音寡若遣趁宮商余病莫能罷忽遇明眼人即自流天下寒寒山三百篇十倍高風雅舜若多神抄無言童子解陽春白雪曲自下和者寡世慮誦時空塵緣吟處罷吾將列作圖寢臥於其下楚吾愛寒山詩通俗兼通雅石女笑無言木人別有解倡前調既高後和聲應寡意句剗交光仁風吹不罷朗誦心花開如空雜寶下石寒山道無人到若能行稱十號有蟬鳴無鴉噪黃葉落白雲掃石磊磊山隩隩我獨居名善導子細看何相好寒知是道行即到絶相似無可號只心傳休口噪直下是從頭掃青山巔白石隩或愚迷須化導佛非佛好不好楚石梁道人罕到樹無名泉無號猿自啼鳥自噪杲日升浮雲掃峰之巔山之隩苔詩誰為導語世間多不好石寒山寒冰鎖石藏山青現雪白日出照一時釋從兹暖養老客寒山上松松下石青者青白者白心無生慮自釋何所為一閒客楚山雪老冰成石霜殺青雲生白春風吹冰痕釋且煨火漫作客石我居山勿人識白雲中常寂寂寒咄衆生弄業識請回光本空寂楚看青山雲轉識雲自閒智自寂石寒山深稱我心純白石勿黃金泉聲響撫伯琴有子期辨此音寒言之深達者心貴似土賤如金無孔笛沒絃琴是何調太古音楚山作骨泉為心貴白石賤黃金吹天籟和帝琴與古人同知音石重巖中足清風扇不搖涼氣通明月照白雲籠獨自坐一老翁寒深林中聽松風兩耳寂萬竅通盡情解絶羅籠問是誰寒山翁楚石林中臥高風一字透萬法通問露柱答燈籠呵呵笑無事翁石寒山子長如是獨自居不生死寒咄諸子只這是信得及長不死楚楚石子詩如是與寒山無老死石我見世間人個個爭意氣一朝忽然死只得一片地闊四尺長丈二汝若會出來爭意氣我與汝立碑記寒堪歎六尺軀只憑三寸氣無厭積金玉不住增田地恨羅三瞋郭二瞥然喉中斷了三寸氣名與姓誰來記楚本分衲僧家泠泠丈夫氣要於夢見處瞥然悟心地一尚無況說二心佛衆生同此氣曠大劫來都不記石家有寒山詩勝如看經卷書放屏風上時時看一遍寒多處三兩言少時千百卷擬抄寒山詩歷劫寫不遍楚我讀寒山詩勝讀經萬卷忍俊不能禁隨口和一遍石豐干禪師詩豐干原詩二首并二和詩共六首余自來天台凡經幾萬回一身如雲水悠悠任去來逍遙絶無鬧忘機隆佛道世間岐路心衆生多煩惱兀兀沈浪海漂漂輪三界可惜一靈物無始被境埋電光瞥然起生死紛塵埃寒山特相訪拾得常往來論心話明月太虛廓無礙法界即無邊一法普遍該豐干吾佛住天台隨機示往回冰壺無影像萬德不將來未免心中鬧直須行佛道佛是自心王清涼除熱惱出離生死海肯守涅槃界透水摩尼光六塵安敢埋尋常活鱍鱍體淨絶纖埃若去更不去若來更不來無有去來者併除事理礙分明百草頭畢竟一法該楚石悲憫娑婆苦時時念幾回衆生背正覺塵劫不思來嬉戲抑何鬧渾忘至要道遷流生死中轉輾增懊惱識陰淪業海情障翳空界而以妙明珠同於塵坌埋咄哉豐干老心淨無纖埃不離蓮花上化身天台來惟心即淨土十方不隔礙南無阿彌陀名稱萬法該石樹本來無一物亦無塵可拂若能了達此不用坐兀兀豐太虛非有物一任清風拂悟得本來人如癡還似兀楚真空不礙物隨用隨時拂拂處更拂之大智如癡兀石拾得詩拾得原詩四十九首并二和詩共一百四十七首自從到此天台寺經今早已幾冬春山水不移人自老見卻多少後生人拾得行盡三千大千界鳥啼花笑一般春識得棚頭木傀儡全是青布幕中人楚石偶住天台國清寺食堂忘卻幾多春獨行獨笑知何事快活徐行不見人石樹君不見三界之中紛擾擾只為無明不了絶一念不生心澄然無去無來不生滅拾君不見茫茫生死不可說一念之間頓超絶無手人挑海底燈昔本不然今不滅楚君不見紅塵堆裏學無為縛得浮雲何快絶浮雲散盡繩結空生滅中見不生滅石我見頑鈍人燈心拄須彌蟻子齧大樹焉知氣力微學咬兩莖菜言與祖師齊火急求懺悔從今輒莫迷拾落髮墮僧數難輕小沙彌衆流成大海誰謂水滴微微塵積不已泰山高可齊凡夫至成佛盡是昔愚迷楚壞裙成蛺蝶餘骨作須彌多識情形變方知道化微參差為物等好醜自天齊以此玩人世灑然豁大迷石君見月光明照燭四天下圓輝掛太虛瑩淨能瀟灑人道有虧盈我見無衰謝狀似摩尼珠光明無晝夜拾摩尼無表裏亦不論高下從本便圓明走盤何脫灑一真含影像五色交遷謝非赤白青黃任陰陽晝夜楚日月能空明難照覆盆下心光安可遮粲若珠雲灑常為萬象主不與四時謝塵剎皆遍周須彌分晝夜石余住無方所盤礡無為理時涉涅槃山或玩香林寺尋常只是閒言不干名利東海變桑田我心誰管你拾奇哉拾得公說此無生理本住天台山常遊國清寺神珠照夜明智劒吹毛利你推倒普賢普賢推倒你楚偉哉普賢王行願兼事理嬉怡冷食堂痛罵諸山寺辨才瓶水傾智用劒鋒利樓閣觀千身非渠亦非你石左手握驪珠右手執慧劒先破無明賊神珠吐光焰傷嗟愚癡人貪愛那生厭一墮三塗間始覺前程險拾一斬一切斬自手握利劒觸著無不燒煌煌爇天焰愚癡輪轉中何時受苦厭吞刀走繩索只管長弄險楚言下可生人金剛一柄劒按時魔膽消渾處神光焰何故頑皮搭受苦不自厭聲色非毒藥過於懸崖險石般若酒泠泠飲多人易醒余住天台山凡愚那見形常遊深谷洞終不逐時情無愁亦無慮無辱也無榮拾觸耳語清泠狂夫盡喚醒千邪俱打正五道任流形永滅輪回苦休纏愛欲情紅塵飛碧海鐵樹吐春榮楚好夢追千古從今不用醒青松同息影怪石共忘形寒暑酌真味歲時徵遠情高懷兹有託莫問世問榮石諸佛留藏經只為人難化不唯賢與愚個個心構架造業大如山豈解懷憂怕那肯細尋思日夜懷姦詐拾長修破屋子未免枯柴化裂破酒肉囊掀翻綾錦架臭煙四蓬㶿薰燎衆驚怕何不審思量尚然行諂詐楚參禪無難易米炭何人化玄義豈在編大經徒設架牀頭木虎驚腳下繩蛇怕古老示真機今時學變詐石嗟見世間人個個愛喫肉碗楪不曾乾長時道不足昨日設個齊今朝宰六畜都緣業使牽非干情所欲一度造天堂百度造地獄閻羅使來追合家盡啼哭爐子邊向火鑊子裏澡浴更得出頭時換卻汝衣服拾他心諸佛心我肉衆生肉都來無兩樣豈可欺四足他是畜頭人我是人頭畜雖曰異皮毛何曾殊愛欲請君斷羊膳從此開魚獄今世施歡喜來生免嗥哭臘月三十日革囊將火浴首參無量壽身著自然服楚我見膏梁家乘車而食肉誰知所食者前世之手足祇為業債深墮胎作異畜此身在苦中錯雜耽淫欲眷屬生成繁刀砧湯火獄猶知孝道哉殺母子號哭況乃含靈明穢德不新浴深省物同原莫換他毛服石出家要清閒清閒即為貴如何塵外人卻入塵埃裏一向迷本心終朝役名利名利得到身形容已憔悴況復不遂者虛用平生志可憐無事人未能笑得汝拾舉世重黃金黃金未為貴爭如無事人樂道山林裏一等稱佛子將身狥財利纖毫不放過贏得神憔悴圓頂披袈裟末梢乖本志怙終無悔心有處安著汝楚蕭疏林下人珠玉不為貴長嘯青峰巔高歌明月裏昨聞荊楚客碌碌貪生利臘月販寒冰眉目皆憔悴寒冰何處無失本兼失志負之待高價大有人笑汝石養兒與娶妻養女求媒聘重重皆是業更殺衆生命聚集會親情總來看盤飣目下雖稱心罪簿先注定拾貧女無妝奩美容人不聘富家女雖醜送禮求年命金玉為首飾猪羊作盤飣不知生死本妄謂因緣定楚石女好顏色木人為歡聘昨夜成婚姻不宰六畜命交棗雲堆盤山梨雪滿飣為歡正未央八字誰排定石得此分段身可笑好形質面貌似銀盤心中黑如漆烹豬又宰羊誇道甜如蜜死後受波吒更莫稱冤屈拾前時美少年豔豔如花質不覺老來催風霜面如漆勸君急回頭念個波羅蜜莫待獄主瞋持書請臨屈楚碌碌塵埃中活埋清淨質發言明似鏡作事昏如漆心馳崖上馬舌舔刀頭蜜若肯遵恬止安心不受屈石佛哀三界子總是親男女恐沈黑暗坑示儀垂化度盡登無上道俱證菩提路教汝癡衆生慧心勤覺悟拾前是功德天後是黑暗女得失人不知升沈海難度曾聞諸佛說只有一條路無出自家心好從今日悟楚怒目阿修羅柔姿摩登女都為道之因彼皆為我度瞪開有頂門無佛衆生路祇要盡迷雲雲盡不須悟石佛捨尊榮樂為愍諸癡子早願悟無生辦集無上事後來出家者多緣無業次不能得衣食頭鑽入於寺拾佛心憐衆生如母病憶子欲與子相見方令母無事別離動萬里呼召非一次可惜好田園死屬司農寺楚佛以一言教開示於諸子三車強分別所貴究竟事頓超十地位證實無階次為僧不了道田園空守寺石嗟見世間人永劫在迷津不省這個意修行徒苦辛拾無我亦無人誰迷生死津青梅和黃檗空自受酸辛楚汪汪大海水鹹淡不同津一地所生菜有苦復有辛石我詩也是詩有人喚作偈詩偈總一般讀時須子細緩緩細披尋不得生容易依此學修行大有可笑事拾拾得與寒山長詩與短偈無窮大地闊不見秋毫細道易卻成難道難還似易休從別處尋盡說君家事楚請以偈作詩時而詩作偈韻須等重輕語不擇粗細晝夜辨剛柔文章從簡易今君悟此門可了生死事石有偈有千萬卒急述應難若要相知者但入天台山巖中深處坐說理及談玄共我不相見對面似千山拾本有靈明性癡人自作難直饒當面見早隔萬重山事上通無事玄中悟又玄推翻狂拾得把住老寒山楚悟之難即易迷者易成難山上見流水水中看載山拾公一點墨天地兩重玄不必天台去蘇州有寒山石世間億萬人面孔不相似借問何因緣致令遣如此各執一般見互說非兼是但自修己身不要言他己拾世人妙丹青傳相無不似指點方寸間難描在於此衆生所流出諸佛只者是大地與山河頭頭皆自己楚人心如面焉亦有說相似相似則非真而況言彼此毋以是為非勿以非作是理長能服人所貴在無己石男女為婚嫁俗務是常儀自量其事力何用廣張施取債誇人我論情入骨癡殺他雞犬命身死墮阿鼻拾罪福籠三界榮枯塞兩儀因雖無實法果亦不虛施作佛須修慧生天未免癡癡人謗般若開眼造阿鼻楚亂世無完土至人有靜儀片言天地振寸草雨雲施成佛豈非夢度生亦是癡於心忘善惡空盡苦阿鼻石世上一種人生性常多事終日傍街衢不離諸酒肆為他作保見替他說道理一朝有乖張過咎全歸你拾小兒要集學先教一件事與不善人居如入鮑魚肆既已誦佛書便當明道理道理若不明葛藤纏殺你楚法無奇特見但順尋常事仁智當勇為癡情勿恣肆莫忘君父恩且逃禪淨理本地悟來深方不辜負你石我勸出家輩須知教法深專心求出離輒莫染貪淫大有俗中士知非不受金故知君子志任運聽浮沈拾德薄真成薄山深未是深古書嫌味淡新曲教人淫富有回天力貧無買藥金唯餘閻老子不逐勢浮沈楚聖賢垂榜樣悲願示何深斷指毋貪殺食針戒妄淫調心成道業唾肉變黃金果爾能如是隨流性不沈石寒山自寒山拾得自拾得凡愚豈見知豐干卻相識見時不可見覓時何處覓借問有何緣向道無為力拾閻浮男子身豈是容易得削髮披袈裟參方拜知識要明自己事休問他人覓廣大信解心摩訶般若力楚寒山非寒山拾得非拾得時時在世間世人都不識三聖百千名一從何處覓咄哉祇者是不著有無力石從來自拾得不是偶然稱別無親眷屬寒山是我兄兩人心相似誰能徇俗情若問年多少黃河幾度清拾法身為假號心印是權稱問我何鄉邑呼誰作弟兄翩翩遊濁世處處度迷情恰似中秋月無雲點太清楚問余何姓字姓字若為稱寒拾乃師友聖賢皆弟兄依依如有意落落竟忘情月瀉梅花影臨溪徹底清石若解捉老鼠不在五白貓若能悟理性那由錦繡包真珠入席袋佛性止蓬茅一羣取相漢用意總無交拾古來持戒僧不畜犬與貓常為殺蠶命紙衣無絮包三條束腰篾一把蓋頭茅今則異於是紛然名利交楚子胡慣養狗南泉曾斬貓用處了生殺兩人同一包維摩除淨室稚圭不剪茅勤隋雖異性意氣自通交石運心常寬廣此則名為布輟己惠於人方可名為施後來人不知焉能會此義未供一庸僧早擬望富貴拾清涼觀國師至老只著布其子有圭峰遺言以尸施當知虛妄身不是真實義畢竟歸空無如何貪富貴楚六度若貫垂萬行深密布佛種從心生寶花隨手施孤雲勢薄天層塔崇高義所用皆御珍不自道為貴石獼猴尚教得人可不憤發前車既落坑後車須改轍若也不知此恐君惡合殺比來是夜叉變即成菩薩拾凡人行舟車不可至夜發後岸未移篙前塗已礙轍須防蛇虎患及有怨讐殺莫待禍臨身狼忙叫菩薩楚獨露無言時萬機從此發松雲拂我衣花徑迷人轍奔瀑欲何之青山看不殺狸奴卻有知常演摩訶薩石自笑老夫筋力敗偏戀松巖愛獨遊可歎往年至今日任運還同不繫舟拾閒依白石青泉坐或向紅塵鬧市遊南北東西無罣礙茫茫大海一虛舟楚萬疊山川經覽後小窗憑几夢中遊何勞縮地觀河嶽心境渾如竹葉舟石躑躅一羣羊沿山又入谷看人貪竹塞且遭豺狼逐元不出孳生便將充口腹從頭喫至尾𩚛𩚛無餘肉拾尸毗古聖王暇日遊林谷一鴿遠飛來而遭鷹所逐將身代鴿命割己充鷹腹為發菩提心白骨重生肉楚利名爭市朝何暇投林谷羶氣羣蠅飛腥風衆梟逐霎時遭虎口頃刻葬魚腹父母哭哀哀那處尋尸肉石銀星釘稱衡緑絲作稱紐買人推向前賣人推向後不顧他心怨唯言我好手死去見閻王背後插掃拾道如身佩觿一解萬結紐悟得圓通人明前復明後古今凡聖學迷悟翻覆手周利槃特迦殷勤誦苕楚癡情不可拔柳線結雙紐愛重則道輕利先必義後財交不到頭色盡終分手何似蓬廬邊自長青苕石閉門私造罪準擬免災殃被他惡部童抄得報閻王縱不入鑊湯亦須臥鐵牀不許雇人替自作自身當拾修慈得梵福作善除天殃至死入冥路隨身惟願王酥酡白玉饌毾㲪黃金牀此樂不可既非君誰敢當楚一念超方便能消萬劫殃談經度野鬼護戒敕天王雲葉成金蓋曇花迸鐵牀人人本具有若個敢承當石無去無來本湛然不拘內外及中間一顆水精絶瑕翳光明透漏出人天拾今來古往性常然活動難收動用間任你白雲千萬匝到頭依舊是青天楚料得方圓又不然那能恰恰有無間從他榮辱隨時變不換青松一片天石三界如轉輪浮生若流水蠢蠢諸品類貪生不覺死汝看朝垂露能得幾時子拾天寒雨作雪日暖冰為水四大合而生六塵離即死人壽能幾何佛法無多子楚人生在浮塵魚命託流水人墮水亡生魚入塵即死靜看塵水中生死沒些子石閒入天台洞訪人人不知寒山為伴侶松下噉靈芝每談今古事嗟見世愚癡個個入地獄那得出頭時拾問石石不答問山山不知幾乾滄海水誰食仙人芝佛性不曾變人心猶自癡祇陀樹下蟻又見絣繩時楚險夷驗道力平淡契真知苦志憑毫管清言生玉芝臥心隨月性開眼放雲癡自笑人緣薄林泉不逮時石古佛路淒淒愚人到卻迷只緣前業重所以不能知欲識無為理心中不掛絲生生勤苦學必定覩吾師拾水濁魚猶聚花殘蝶尚迷貪淫不肯止昏惑太無知腳下五色索心中千尺絲當人解除斷立見毗盧師楚肉臭羣蠅集花殘人尚迷邪風何所恃正義忽無知滿眼壅污穢渾身臥亂絲臨終交劇苦悔不早從師石各有天真佛號之為寶王珠光日夜照玄妙卒難量盲人常兀兀那肯怕災殃唯貪淫佚樂此輩實堪傷拾貪心不知足自昔頂生王統御四天下威神不可量上圖忉利主淪墜始知殃已過無量劫傳聞為你傷楚欺人強曰悟閉戶僭稱王白豕自奇異黔驢不忖量虛言折盡福妄想釀成殃急早悔前過天真毋太傷石出家求出離哀念苦衆生助佛為揚化令教選路行何曾解救苦恣意亂縱橫一時同受溺俱落大深坑拾富自貧時積愁從喜處生禪心須勉勵佛戒好遵行直感人天豎邪招鳥獸橫心如一片地不用掘溝坑楚欲知不可死已見未曾生鉢塔雲頭護鞋山水上行古今一舌在天地兩眸橫若論形骸事賢愚無異坑石常飲三毒酒昏昏都不知將錢作夢事夢事成鐵圍以苦欲招苦捨苦無出期應須早覺悟覺悟自歸依拾榮枯親眼見善惡寸心知可歎公候宅徒將錦繡圍財寧無散日運亦有終期松柏薪將盡兒孫失所依楚榮華徒自豢夢幻總何知漸禿松楸頂難堪楊柳圍丹砂不駐色白骨無窮期念彼金枝貴終為黃土依石悠悠塵裏人常樂塵中趣我見塵中人心多生憫顧何哉憫此流念彼塵中苦拾貪為地獄因瞋入修羅趣只管向前行也須回首顧如來出世間本救衆生苦楚聲聞拘小智了了自為趣獨覺耽神解後羣多不顧欽哉大菩薩代受衆生苦石少年學書劒叱馭到京州聞伐胸奴盡婆娑無處遊歸來翠巖下席草枕清流壯士志朱紱獼猴騎土牛拾吾生太平世親到帝王州豈料干戈動難為海嶽遊城池嗟已破日月去如流長夜何時旦空歌寧戚牛楚獨引蒲團坐讀書志四州雅文隨意及好句縱心遊後不見來者前誰爭上流悠悠白雲外何處覓人牛石雲山疊疊幾千重幽谷路深絶人蹤碧澗清流多勝境時來鳥語合人心拾山好千千萬萬重馬啼車轍永無蹤道人靜坐深林夜明月高懸太古心楚老衲斑斕山影重草鞋無底印苔蹤歸家洗腳埋頭坐冷暖從來只問心石後來出家子論情入骨癡本來求解脫卻見受驅馳終朝遊俗舍禮念作威儀博錢沽酒喫翻成客作兒拾頻言嫌我絮寡語笑吾癡但得偷心死何愁別念馳方袍僧格量圓頂佛容儀有智誇兒老無財厭老兒楚但得無生理何妨渾若癡兩丸不可定一念未曾馳老石頑猶韻空巖影亦宜偶拈紅葉子題贈當家兒石若論長快活唯有隱居人林花長似錦四季色常新或向巖間坐旋瞻丹桂輪雖然身暢逸卻念世間人拾無窮山水樂不染利名人松竹深深處雲霞片片新爐中撥芋火月下轉茶輪昔作紅顏客今為白首人楚點雲生五色幻樹復如人真見毋忘舊空花漫賞新胸中開露地指外運風輪獨笑劫前境誰分天與人石我見出家人總愛喫酒肉此合上天堂卻沈歸地獄念得兩卷經欺他市鄽俗豈知鄽俗人大有根性熟拾洋銅一壺酒熱鐵兩盤肉諸佛無妄言調達長在獄釋子當持戒沙門合離俗休誇色身健正恐業果熟楚林老幾碗酒汾陽三塊肉了即涅槃山不了刀尖獄廣額本來佛淨名偶示俗禪為忠孝原生處切須熟石嗟見多知漢終日枉用心岐路逞嘍囉欺謾一切人唯作地獄滓不修來世因忽爾無常到定知亂紛紛拾若要速成佛先須了自心尋常行履處徹見本來人遊戲神通力莊嚴淨土因何勞一彈指花雨自繽紛楚七徵覓無緒何處是真心得法應忘法醒人不立人但空地獄業莫作天堂因一悟劫前事珠光萬道紛石迢迢山徑峻萬仞險隘危石橋莓苔緑時見片雲飛瀑布懸如練月影落潭輝更登華頂上猶待孤鶴期拾境勝多般異峰高萬仞危青天上頭轉白日下方飛鐵磬侵晨響金燈徹夜輝居山亦不戀涉世本無期楚登頂若天步身輕無險危短筇同石立破衲逐雲飛孤鳥入空翠衆泉生遠輝閒吟不能已此路竟誰期石松月冷颼颼片片雲霞起匌匝幾重山縱目千萬里溪潭水澄澄徹底鏡相似可貴靈臺物七寶莫能比拾千峰嵐氣收萬壑松聲起明月為故交白雲作鄰里清風屢披拂流水長舉似試問本來人欲將何物比楚終朝無所為一念竟忘起花笑兩三枝雲來千萬里微言絶對待老石或差似盡法不容毛擬將何者比石世有多解人愚癡學閒文不憂當來果唯知造惡因見佛不解禮覩僧倍生瞋五逆十惡輩三毒以為鄰死定入地獄未有出頭辰拾彼云無量壽此曰釋迦文不異我心出還同他世因孜孜厚行願漸漸息貪瞋大士可為法諸賢相與鄰莊嚴信所慕翹想在斯辰楚古衲不談禪名流不論文既能空有相亦莫謗無因仁極乃行殺慈深故用瞋居凡曾未纍在聖若為鄰落落隨時去機前十二辰石可笑是林泉數里勿人煙雲從巖嶂起瀑布水潺潺猿啼暢道曲虎嘯出人間松風清颯颯鳥語聲關關獨步繞石澗孤陟上峰巒時坐盤陀石偃仰攀蘿沿遙望城隍處唯聞鬧喧喧拾松籟劇流泉山嵐似吐煙側身路渺渺濯足波潺潺南北雙峰外東西兩嶺間誰能忘世慮自此立禪關碧樹改紅葉白雲停翠巒林巢恣偃仰野棹或洄沿城郭不可處輪蹄何太喧楚泉香流石骨遠望似飛煙聽徹峰恆靜心通水得潺梅花開十里茅屋祇三間馴虎長依座吟猿時護關山人飄白髮竹杖過蒼巒晤笑疏鐘動迂回古澗沿禪心清欲絶不復信塵喧石水浸泥彈丸思量無道理浮泡夢幻身百年能幾幾不解細思惟將言常不死誅剝壘千金留將與妻子拾三聖數百篇篇篇明佛理流傳古尚多散落今餘幾讀者通賢愚知之出生死休將陽春曲喚作江城子楚數讀三聖詩言言關至理傳之古僅存擬者空餘幾寡和調既高真知句不死其誰了了然信是奇男子石附重刻和天台三聖詩序楚石琦禪師自雙徑發悟後作為詩文皆第一義如雪山肥膩純淨無雜本傳所載著有北遊鳳山西齊三集及和天台三聖永明陶潛林逋諸家詩而西齊集與和三聖詩五百年來尤膾炙於老儒尊宿之口西齊集既刻於吳中和三聖詩獨無傳本輒以為恨今歲清涼寺傳戒隨藥藕二公登藏經閣見有以禪林唱和集名者乃楚石石樹二老人和天台三聖詩也爰分為三集藕公刻原唱藥公刻石樹寂與季子栽甫刻是編一夕之聚頓令三聖密語二老心傳並垂不朽詢樂事也昔汪大紳之論詩曰有詩人之詩有道人之詩夫範水模山吟風弄月一草一木窮其幽致一字一句盡其推敲此詩人之詩於出世第一義渺不相值也若夫道人之詩一自真性中流出通天地萬物之靈而無所作為也湧泉源萬斛之富而不立一字也苟得其意雖漁歌樵唱鳥語蟲吟乃至山河大地牆壁瓦爍有情無情若語若默一一皆宣妙諦塵塵普轉法輪若是者可與讀楚石詩并可與讀三聖詩彼執指為月隨語生解者雖讀盡三藏十二部如數他家寶於己無分何足以知是詩哉光緒甲申季冬海虞弟子張寂謹序合訂天台三聖二和詩集新刻緣起雲騰鳥飛于虛空而虛空無跡風動塵翳于日色而日色不變生死煩惱現乎我心而我心體本清淨所謂終日在妄終日恆真也舉其真真不可見檢其妄妄不可覓真雖不見而性包十虛妄雖難覓而十界咸具有無既亡言思何及古哲謂諸佛到此口掛壁斯之謂也然則諸佛說教祖師垂言豈非以釘釘虛空乎空寧可釘哉涅槃經有四不可說以四悉檀因緣故可說蓋衆生既迷不以教無以入其門何令升堂入室耶法華云佛種從緣起是故說一乘是故聖賢立言垂教或讚或毀或順或逆捧喝交馳與奪分明種種巧施總趁機妙用即令觸處親見面目也且天台三聖內祕根本之智外現落拓之形詩歌隨口言言顯諦笑罵狂發處處靈機凡眼莫覷皆以為癡非閭邱感豐干之愈疾孰知其為三聖耶又其詩散乎巖石舊壁樹葉及人家壁誰為收録之是知聖作必有克傳緣固然耳原本寒山詩三百七首豐干詩二首拾得詩四十九首明初楚石琦公一一和之明末石樹師為之載和禪機俱徹足見三聖之心矣初刻分三集名禪林唱和集又刻或將二和簡次於原詩𭆞刻成集名和三聖詩集然今坊刻寒山原詩只一百二十七首次第亦別乃清雍正御選本也光緒間有藕師刻原唱藥師刻石樹海虞張寂居士刻楚石仍分三集其序附此民國三年春常熟法華寺耀文和尚請余講彌陀疏鈔城有張楚懷居士以二和詩兩本并娑羅閣清言見贈十餘年來欲刻未遂戊辰有覺觀師函索方外詩類之書余志方切遂函常熟耀師蔡善士慧清於藏書家訪之唯得龐北海居士家所藏張刻楚石版而藕刻藥刻二版未知所藏庚午秋又講圓覺於法華寺本城蕭沖友居士以唱和合刻舊本見送余時猶欲三集分刊逮辛未春赴蘇隆慶講彌陀要解特謁報國寺印光法師言及於斯即呈舊本請以較閲師云盍依舊刻之醒目易讀乎師縱慧眼所有誤者及俗體破體字悉改正焉余易其題曰合訂天台三聖二和詩集遂登梨棗即祈來者隨讀直得寒山真面目而於清風明月流水高山恍然莫知我誰可謂覿面而見三聖矣夫民國二十年辛未春天台石梁觀月比邱興慈謹撰雲居山常寂光佛法僧覺觀裏成見立寶雲清元會元根禪了策德珩寬道等十人見聞隨喜共集板資四十元上海法藏寺一百元伏願法界有情同圓種智上海法藏寺募刻揚州藏經院藏版
