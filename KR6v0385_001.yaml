body:
  text: 唐寒山豐干拾得三聖原詩明四明楚石梵琦首和明西吳石樹濟嶽載和寒山詩寒山原詩三百七首并二和詩共九百二十一首重巖我卜居鳥道絶人跡庭際何所有白雲抱幽石住兹凡幾年屢見春冬易寄語鐘鼎家虛名定無益寒山我讀寒山詩虛空尋鳥跡誰能橫點頭獨有松下石一字不可加千金豈能易捧心學西子取笑非求益楚石乘霞入塢深蒼苔幻成跡笑看牧牛子空山樵老石畢竟牛何歸石頭不可易花草總忘言此中誰損益石樹凡讀我詩者心中須護淨慳貪繼日廉諂曲登時正驅遣除惡業歸依受真性今日得佛身急急如律令寒身將枯木同心與蓮華淨萬善無異途千邪皆稟正不離文字相不即真如性浩浩天地間咸遵法王令楚秋空潔如洗我念歸真淨山高絶世緣樹影忘偏正林氣養素懷天香適野性記將今日期鴻雁來時令石可笑寒山道而無車馬蹤聯溪難記曲疊嶂不知重泣露千般草吟風一樣松此時迷徑處形問影何從寒寒山不可見石上訪遺蹤木屐藏何處華臺隔幾重溪流深夜月樹老舊時松可歎閭丘子栖栖失所從楚林中常獨步幽徑絶人蹤直上身孤險回看山萬重瘦藤牽古樹破衲照青松長憶寒巖子追之安所從石欲得安身處寒山可長保微風吹幽松近聽聲愈好下有斑白人喃喃讀黃老十年歸不得忘卻來時道寒人命呼吸間榮華定難保不如天台去山水清且好江月長近簷松風可娛老胡為逐名利來往紅塵道楚亂離何足畏慧命須勤保泉石固幽深隨緣納亦好偶爾住民房且學棲賢老塵市即山居觸處無非道石吾心似秋月碧潭清皎潔無物堪比倫教我如何說寒莫比心如月秋霜亦非潔諸來參學人試聽虛空說楚小鐺煮日月泉水何高潔毛髮生光明草木豈無說石山中何太冷自古非今年沓嶂恆凝雪幽林每吐煙草生芒種後葉落立秋前此有沈迷客窺窺不見天寒昨向山中住不知今幾年巖高長隱日樹密但藏煙策杖遊峰頂飛禽過我前澄潭深萬丈徹底是青天楚高巖託老骨不必問何年世事付朝露人情任暮煙神留搖落後意在發生前流水杳然去桃花笑碧天石城中蛾眉女珠珮何珊珊鸚鵡花前弄琵琶月下彈長歌三月響短舞萬人看未必長如此芙蓉不耐寒寒東鄰嬌小女芳意未闌珊眉似初三月琴能再四彈頻來花下坐自向鏡中看不料傷春死瓊樓夜夜寒楚十五西鄰女金璫玉珮珊嬌姿依水見素指把花彈老大誰為惜虛無只自看枯形向壁坐萬古流蒼寒石俊傑馬上郎揮鞭指柳楊謂言無死日終不作梯航四運花自好一朝成萎黃醍醐與石蜜至死不能嘗寒誰家遊冶郎白馬繫垂楊卻引如花妓同登載酒航春風弄水碧落日映山黃忽掩泉臺路珍羞不得嘗楚征夫如敗葉驕子等枯楊吾豈逐戎馬自然浮野航梅花方丈白橘柚洞庭黃反笑風塵者曾將此味嘗石欲向東巖去于今無量年昨來攀葛上半路困風煙徑窄衣難進苔粘履不前住兹丹桂下且枕白雲眠寒住久都忘世春深始覺年山花紅似火野草碧如煙月落澄潭裏雲生疊嶂前時時敲鐵磬驚動老龍眠楚河圖未下點此際是何年至靜立山水無端起瘴煙紛紜成太古寂寞置當前不覺春風至吳蠶三月眠石巖前獨靜坐圓月當天耀萬象影現中一輪本無照廓然神自清含虛洞玄妙因指見其月月是心樞要寒心如大圓鏡萬象同輝耀本淨非琢磨元明不隨照于中有得失向上無玄妙打破此鏡來吾人云甚要楚心與境絶滓身與山爭耀身心無異論水月互相照於此悟尋常何必談玄妙玄妙則不無真機非至要石吾家好隱淪居處絶囂塵踐草成三徑瞻雲作四鄰助歌聲有鳥問法語無人今日婆娑樹幾年為一春寒白石照清淪幽棲遠俗塵山高雲作頂地僻虎為鄰縱有長生理終無不死人蟠桃花果熟知是幾番春楚所思若沈淪聖解亦成塵得到孤峰頂方超萬壑鄰法忘不立我我盡自無人滿眼天花落融融大地春石琴書須自隨祿位用何為投輦從賢婦巾車有孝兒風吹曝麥地水溢沃魚池常念鷦鷯鳥安身在一枝寒形將影自隨行與止誰為始富張車子終窮蔡克兒才高鸚鵡賦地絶鳳凰池可信陽春力難回朽木枝楚舉橈波自隨靜坐但無為快織追雲使憑凌歌水兒莫遲花兩岸須聽月分池此意向誰說江頭鳥坐枝石弟兄同五郡父子本三州欲驗飛鳧集須旌白兔遊靈瓜夢裏受神橘座中收鄉國何迢遞同魚寄水流寒青春開上苑白日照神州出就都人飲行陪國士遊馬驕晴更躍花豔暮還收老去空惆悵河聲西北流楚茅蓬地十尺廣大過皇州蒙眼入孤定橫身縱四遊圖書一枕載世界半竿收若問此中意黃河水逆流石一為書劒客三遇聖明君東守文不賞西征武不勳學文兼學武學武兼學文今日既老矣餘生不足云寒磊落夔龍士聰明堯舜君黃扉論大道紫塞樹奇勳食肉封侯骨經天緯地文北邙山下路到此漫云云楚少有屠龍劒時艱未遇君自從立志節無復論功勳土壁霜分色蓬窗雪照文徘徊獨長嘯情理為誰云石莊子說送終天地為棺槨吾歸此有時唯須一幡箔死將餧青蠅弔不勞白鶴餓著首陽山生廉死亦樂寒天下白玉棺人成黃金槨送終無貴賤未可笑織箔不死丁令威千年化為鶴莊生喻髑髏何用南面樂楚勘破未生前那用天為槨生不重千金死奚貴一箔不打嘉州象便跨華亭鶴無喜亦無瞋何苦亦何樂石人問寒山道寒山路不通夏天冰未釋日出霧朦朧似我何由屆與君心不同君心若似我還得到其中寒只道山無路那知處處通澗泉聲滴瀝雲月影朣朧上下千尋峻東西四面同谷神呼輒應非在有無中楚峰遠若無色歌來徑別通白泉黃葉溜疏樹薄烟朧入壑探奇異登巔觀大同寒山招我去歌嘯月明中石天生百尺樹剪作長條木可惜棟梁材拋之在幽谷年多心尚徑日久皮漸禿識者取將來猶堪拄馬屋寒何處好園林此中多樹木擎天要一柱匠者入空谷歲久霜霰繁根深枝葉禿棄之不肯收無以成我屋楚世如破漏船身似無根木船破須高岸人老宜深谷水流岸已非葉落山頸禿積雪送溪涯寒林露茅屋石驅馬度荒城荒城動客情高低舊雉堞大小古墳塋自振孤蓬影長凝拱木聲所嗟皆俗骨仙史更無名寒寒食向西城其誰不慘情白楊千萬葉青草兩三塋再聽流泉語如聞慟哭聲焉知有死日爭利復爭名楚垂首望孤城荒煙生慘情玄雲迷故國黃葉覆新塋不見人顏色時聞野哭聲嗟哉負心者徒涴一生名石鸚鵡宅西國虞羅捕得歸美人朝夕弄出入在庭幃賜以金籠貯扃哉損羽衣不如鴻與鵠颻揚入雲飛寒金籠鎖鸚鵡鸚鵡苦思歸既失煙霞伴徒傷錦繡幃臨風吐音響對月理毛衣若得君恩放還尋隴樹飛楚乾坤一籠耳人鳥將何歸安得恃金粟而終依錦幃扶搖仍御氣歌舞謾褰衣我志不羈落蓬蓬空外飛石玉堂掛珠簾中有嬋娟子其貌勝神仙容華若桃李東家春霧合西舍秋風起更過三十年還成甘蔗滓寒翩翩馬上郎借問誰家子賤妾有高樓須君駐行李雞鳴北斗斜鴉噪東方起君意終別離妾身在泥滓楚垂楊繫畫舫水影照西子色豔比夭桃命澀如苦李長歌絲竹交短舞山雲起爭望謂神仙須臾成穢滓石父母經營多田園不羡他婦搖機軋軋兒弄口㗻㗻拍手催花舞搘頤聽鳥歌誰當來歎賀樵客屢經過寒田舍苦無多荒來亦任他草深蟲唧唧林密鳥㗻㗻野老攜壺至山童拍手歌幽棲自可樂百歲等閒過楚華士硯田多山僧甘讓他真文毋甚解閒話不勞㗻露滴花含笑風來鳥帶歌日長無事做但看白雲過石家住緑巖下庭蕪更不芟新藤垂繚繞古石豎巉巖山果獼猴摘池魚白鷺銜仙書一兩卷樹下讀喃喃寒有美千般草無令一樣芟深林常積雪別洞近寒巖碧樹雲相補青山日半銜不知何所說幽鳥語喃喃楚野草當鋤去邪書逞筆芟清風涼夏木紫氣蒸寒巖松晝雲初合花明鳥獨銜丹經無句讀諷誦口喃喃石四時無止息年去又年來萬物有代謝九天無朽摧東明又西暗花落復花開惟有黃泉客冥冥去不回寒春秋更代謝暑往即寒來一雨野花落多風林木摧方看朝霧擁歘見暮雲開少小顏如玉而今喚得回楚節序何為者盛衰迭往來月光不云去花影暗相摧小定香初刻微吟鐘乍開此時清興在茗味舌端回石歲去換愁年春來物色鮮山花笑緑水巖樹舞青煙蜂蝶自云樂禽魚更可憐朋遊情未已徹曉不能眠寒今日是何年東風碧草鮮山晴還起霧水暖復生煙鳥語如相問花枝豈自憐野人無個事高枕石頭眠楚深山不記年花草逐時鮮瘦竹常穿月高松不綴煙白雲容我懶破衲豈入憐嘯傲孤峰頂青燈影獨眠石手筆太縱橫身材極魁偉生為有限身死作無名鬼自古如此多君今爭奈何可來白雲裏教你紫芝歌寒堂堂七尺軀所學尤奇偉每著古衣冠不怕閒神鬼達少窮困多有材如命何將琴換美酒痛飲且高歌楚苟無諂曲心才氣自高偉靦顏命為人搖脣慣說鬼彌天此輩多正法將如何伎倆有時盡奚用桃符歌石粵自居寒山曾經幾萬載任運遁林泉棲遲觀自在巖中人不到白雲常靉靆細草作臥褥青天為被蓋快活枕石頭天地任變改寒人生一世間俯仰惟覆載去者日已多曾無故人在思之氣鬱律感彼雲靉靆高岸竟為谷新松俄偃蓋百年能幾時虛空終不改楚但了目前事無論千百載勞勞聖人心敬之儼然在日月自光華雲霞自靉靆恢恢大地中那許微塵蓋俗眼縱遷流至道何曾改石有一餐霞子其居諱俗遊論時實蕭爽在夏亦如秋幽澗常瀝瀝高松風颼颼其中半日坐忘卻百年愁寒山林有何好每愛此中遊江月白如晝海風涼似秋柴門向悄悄樹葉風颼颼寄語貂蟬客可來消汝愁楚道人有深意山水恣夕遊霜靜葦色苦月高松陰秋鳥歸花亦睡風定葉還颼此意有誰解江天釋我愁石妾家邯鄲住歌聲亦抑揚賴我安隱處此曲舊來長既醉莫言歸留連日未央兒家寢宿處繡被滿銀牀寒趙女發清唱聽之聲激揚臨風奏此曲曲短意何長夫壻出不歸峩冠朝未央焉知秋夜永明月照空牀楚娥娥燕趙女夫壻客荊揚獨處思激楚短歌不能長引聲有時盡含意殊未央風月吹向夕羅羅照人牀石快搒三翼舟善乘千里馬莫能造我家謂言最幽野巖穴深嶂中雲雷竟日下自非孔丘公無能相致者寒自從開闢來此地無車馬而有聖道場深山連曠野人生百年間日照四天下誰是金石姿常存不亡者楚萬派須歸宗快會越天馬如人拘小竇忽然見大野亦猶三藏文一時悟言下言下事如何不是之乎者石智者君拋我愚者我拋君非愚亦非智從此繼相聞入夜歌明月侵晨舞白雲焉能住口手端坐鬢紛紛寒堆錢向百屋我固不如君一道清虛理知君亦不聞下方陰有雪絶頂晝無雲未息塵勞苦誰儂為解紛楚世無知我者而常懷此君此君久默然而我亦無聞丈室懸紅日臥牀生緑雲山光交四壁心境絶塵紛石茅棟野人居門前車馬疏林幽偏聚鳥溪闊本藏魚山果攜兒摘臯田共婦鉏家中何所有唯有一牀書寒可愛白雲居長年與世疏花殘無戲蝶水靜足遊魚野樹行堪倚園葵懶不鉏茅簷風雨過飄濕案頭書楚四照蘆花居隔簾天影疏分餐餉野鶴科樹蔭家魚堤窄祇容履坡閒好學鋤此身山水鏡几席不留書石登陟寒山道寒山路不窮溪長石磊磊澗闊草濛濛苔滑非關雨松鳴不假風誰能超世纍共坐白雲中寒地遠心逾寂情忘理自窮水聲常浩浩嵐氣正濛濛永夜猿啼月無時虎嘯風纖塵遣未盡不可住山中楚丘壑探無盡臥謠意莫窮短筇分翠靄孤笠入空濛松靜暗如雨竹深涼欲風此時聞亦寂人在葉聲中石六極常嬰困九維徒自論有才遺草澤無藝閉蓬門日上巖猶暗煙消谷尚昏其中長者子個個總無裩寒何由傾我意不得與君論一悟天真佛長拋火宅門風霜令鬢改利欲使心昏頗憶阮生傳危哉蝨處裩楚心已同灰冷更將何事論世塵緣有路吾道卻無門泉響能清惑山光可滌昏笑思㘞地日無袴又無裩石白雲高嵯峨緑水蕩潭波此處聞漁父時時鼓棹歌聲聲不可聽令我愁思多誰謂雀無角其如穿屋何寒青嶂鬱嵯峨潺湲流水波林間無雀噪谷口聽鶯歌回首暮雲合向人秋意多秦皇與漢武千古恨如何楚筆峰太峨峨潭水清無波上下隔千里漁樵互答歌歌從何處接聽者不能多祇有無耳人聞之將奈何石杳杳寒山道落落冷澗濱啾啾常有鳥寂寂更無人淅淅風吹面紛紛雪積身朝朝不見日歲歲不知春寒閒行芳樹下卻坐小溪濵白日又長夜黃泉多故人悠悠前後事擾擾死生身借問東溟水乾來幾度春楚崒崒高峰頂泠泠淺水濵飄飄雲似鳥磊磊石如人白白梅花骨青青蒲葉身悠悠世外曲句句和陽春石少年何所愁愁見𩯭毛白白更何所愁愁見日逼迫移向東岱居配守北邙宅何忍出此言此言傷老客寒遙見川上花朱朱兼白白開落不暫停寒暑相催迫宿草生故墳垂楊映新宅新宅能幾時百年如過客楚不忍賦東園桃紅兼李白方兹朝露榮倏為秋霜迫轉眼飛觴地痛心改墓宅人生聚沫間誰是千年客石聞道愁難遣斯言謂不真昨朝始趁卻今日又纏身月盡愁難盡年新愁更新誰知席帽下元是昔愁人寒遣愁愁不去認愁愁不真誰知遣愁者正是自愁身身貌年年改愁端日日新無愁亦無喜方見本來人楚學道莫乾苦疑情須發真掃開千件事拌此一生身秋去黃花盡春來緑葉新靜中觀物理何者可愁人石兩龜乘犢車驀出路頭戲一蠆從傍來苦死欲求寄不載爽人情始載被沈纍彈指不可論行恩卻遭刺寒道傍多大樹樹下羣兒戲上有一蟬鳴不知身是寄螳螂來捕之未免黃雀纍黃雀被蟬射哀哉作詩刺楚融風吹白沙萬物各遊戲老蚌出潛波肉張沙上寄彼饞鷸鳥來持啄身兼纍漁父坐而收乃為季子刺石三月蠶猶小女人來采花隈牆弄蝴蝶臨水擲蝦䗫羅袖盛梅子金鎞挑筍芽鬬論爭物色此地勝余家寒五月南塘路芙蓉正作花朱門蔭楊柳緑水鳴蝦䗫冷浸金盆果濃烹石鼎芽此中可避暑修竹繞吾家楚南陌採桑女紅裳出衆花朔風看戴勝兆雨聽蝦䗫茗點楊花莢蔬烹蕨草芽尋常生計好稱是野人家石東家一老婆富來三五年昔日貧於我今笑我無錢渠笑我在後我笑渠在前相笑儻不止東邊復西邊寒富謂無貧日貧思有富年由來人作鬼枉用紙為錢白骨深泥下青苔古墓前虛空猶可料生死莫知邊楚人富愁貧日吾貧如富年萬峰隨分住不用一文錢澗水茅檐下巖花竹檻前寒來可曝背暑氣坐涯邊石富兒多鞅掌觸事難祇承倉米已赫赤不貸人斗升轉懷鈎距意買絹先揀綾若至臨終日弔客有蒼蠅寒人心常不足此事古相承富欲身千歲官貪日九升黃泉葬白骨粉字寫紅綾酒肉陳高座徒悲一聚蠅楚愚夫做家業念念子孫承取利必高等收租加大升廩盈愁絶食箱滿歎無綾勞碌為牛馬尸牀弔臭蠅石余曾昔覩聰明士博達英靈無比倫一選嘉名喧宇宙五言詩句越諸人為官治化超先輩直謂無能繼後塵忽然富貴貪財色瓦解冰消不可陳寒六個兒郎同作伴千般藝術更無倫是非強要分清濁聲色徒然立我人只道朱顏長滿鏡那知碧海會飛塵可憐掩泣華堂後縱有笙歌不可陳楚裁詩補衲舊和新體致從來重五倫翻憶聖皇形似獸詎知貪吏面如人恩辜愛日龍文錫名涴秋風馬矢塵遮莫生前忙悔過森羅殿上恐難陳石白鶴銜苦花千里作一息欲往蓬萊山將此充糧食未達毛摧落離羣心慘惻卻歸舊來巢妻子不相識寒十年不相見彼此無消息待雁雁不來釣魚魚不食天長關塞遠佇立空悽惻縱有一封書何由寄親識楚崑崙有大鵬一舉萬里息剛風壯其威小人肥其食佛示無緣慈午齊先憫惻羽毛成世界彼此不相識石慣居幽隱處乍向國清中時訪豐干老仍來看拾公獨回上寒巖無人話合同尋究無源水源窮水不窮寒天台國清寺古木亂泉中此地橫千嶂何人識二公雲形旦暮改石色古今同須信這箇意推尋無有窮楚誦詩幽澗上遺響白雲中瀟灑寒山子規模楚石公言詮非有異神解將無同信手揮毫處層巒水不窮石生前太愚癡不為今日悟今日如許貧總是前生做今生又不修來生還如故兩岸各無船渺渺應難渡寒迷是悟中迷悟是迷中悟迷悟非兩塗皆由一心做心源常湛寂從本無住故無住亦不立生死海乃渡楚知迷即不迷求悟便難悟但看日用時祇貴無心做無心做甚麼清淨本然故迷悟雲盡開片花流野渡石璨璨盧家女舊來名莫愁貪乘摘花馬樂搒采蓮舟膝坐緣熊席身披青鳳裘哀傷百年內不免歸山丘寒朱門年少妾白髮老來愁竟作商人婦長隨賈客舟花殘始春釀霜隕未冬裘歎息風波裏何時返舊丘楚長干有蕩婦妖麗不知愁爭試都中馬頻乘江上舟璫鳴珠翠襪袖倚鷫霜裘旦暮風流盡煙埋骨一丘石氐眼鄒公妻邯鄲杜生母二人同共老一種好面首昨日會客場惡衣排在後只為著破裙喫他殘䴺寒飛雉感故兒掇蜂念前母焉知采桑人正恨飛蓬首坎坷一生中崢嶸千載後真金去砂礫嘉饌輕䴺楚昔日淮陰侯一餐寄漂母卒與三傑參次列元功首醉飽雲夢前笑談鐘室後不如平等人窮老喫糖石獨臥重巖下蒸雲晝不消室中雖暡靉心裏絶喧囂夢去遊金闕魂歸度石橋拋除鬧我者歷歷樹間瓢寒路出危峰上春深雪未消獨行形問影枯坐寂忘囂玉立千尋剎金飛百尺橋須臾雲歘起化作雨翻瓢楚高巖積空翠極古未曾消石迸泉云靜雲開樹不囂神遊國清寺夢坐石梁橋得句笑無筆臨崖刻木瓢石夫物有所用用之各有宜用之若失所一闕復一虧圓鑿而方枘悲哉空爾為驊驑將捕鼠不及跛猫兒寒虛心待萬物無適而不宜待物苟有心紛然成與虧千峰若菡萏孰是雕鎪為將欲究根本問取石女兒楚於心何所好制用但隨宜責己應長損與人勿暫虧即名超有漏不啻證無為如是心持遠真成作者兒石誰家長不死死事舊來均始憶八尺漢俄成一聚塵黃泉無曉日青草有時春行到傷心處松風愁殺人寒榮枯有定分修短未嘗均匕首生衽席旄頭沒戰塵清宮不畏暑陋巷豈知春一去無回日驪山殉葬人楚工夫如病瘧寒曝未能均暫爾破凡見依然臥法塵野村花落晚荒冢草為春此景君須悟這回可示人石驑馬珊瑚鞭驅馳洛陽道自憐美少年不信有衰老白髮會應生紅顏豈長保但看北邙山個是蓬萊島寒東西南北人南北東西道有往必有來無生定無老婚姻本相結生死各不保劫盡火洞然誰論林與島楚蕭蕭華表門薜蘿遮墓道靈臺何所歸枯骨不知老狐魅雜相居子孫安可保其如頂後光而照於林島石竟日長如醉流年不暫停埋著蓬蒿下曉日何冥冥骨肉消散盡魂魄幾凋零遮莫咬鐵口無因讀老經寒風輪轉烏兔不得須臾停昨暮沈厚地今晨出高冥雪霜有肅殺蘭艾俱飄零人命若朝露勸君尋佛經楚須彌繞日月飛光肯暫停此方夜如晝彼土日云冥彼土花將發此方葉已零世人何不曉不讀雜華經石一向寒山坐淹留三十年昨來訪親友大半入黃泉漸滅如殘燭長流似逝川今朝對孤影不覺淚雙懸寒故人猶記面相別未逾年有恨成千古無書達九泉殯宮新草木華屋舊山川不見高堂會空悲畫像懸楚莫問今何日花開又一年山深如隔世世險即重泉過客草頭露浮生萍在川誰知峰頂月無影直高懸石相喚采芙蓉可憐清江裏遊戲不覺暮屢見狂風起浪捧鴛鴦兒波搖鸂鶒子此時居舟楫浩蕩情無已寒朝遊荷葉間暮宿荷花裏日落煙霧生風來波浪起妾歌采蓮曲君唱結襪子同蒂復同心馨香殊未已楚我昔弄輕舟泊在蘆花裏靜看江紋生坐到山月起垂綸追玄真憑橈笑船子今讀寒山詩浩浩情何已石垂柳暗如煙飛花飄似霰夫居離婦州婦在思夫縣各在天一涯何時復相見寄語明月樓莫貯雙飛燕寒昔往桃作花今歸雨成霰扁舟隔江海數夢還鄉縣逝水去不回故人難再見欲留五色絲以繫孤飛燕楚人身小天地寒涕如飛霰皮裏載溪山胸中藏郡縣智人方寸施肝膽萬里見苟不本所從茫茫梁上燕石有酒相招飲有肉相呼喫黃泉前後人少壯須努力玉帶暫時華金叉非久飾張翁與鄭婆一去無消息寒前鬼擔尸來後鬼欲奪喫邀人證其虛竟賴實語力雖遭後鬼噉復因前鬼飾思量我是誰從此輪回息楚獸相食且惡人類忍殘喫殺子不充飢賣身無氣力恩情既斷絶天理難遮飾怨報影隨形輪回卒未息石可憐好丈夫身體極稜稜春秋未三十才藝百般能金羇逐俠客玉饌集良朋唯有一般惡不傳無盡燈寒少年學弓劒所向振威稜碧海擒龍易青山射虎能長尋花作伴儘用酒為朋一旦佳城閉其誰見漆燈楚僞儒談道學狂氣似鋒稜言大行偏寡名華實未能蜢蝗傷稻客蛺蝶盜花朋秋盡愁無緒書窗拍晚燈石桃花欲經夏風月催不待訪覓漢時人能無一個在朝朝花遷落歲歲人移改今日揚塵處昔時為大海寒富貴何日來留將少年待少年忽復去惟有白髮在髮白歸九泉須臾陵谷改方當未足心欲吸無窮海楚古道空郵亭光陰安可待故人去不還知己無多在秋柳寒風摧紅顏霜鬢改徘徊瞬息間日又沈蒼海石我見東家女年可十有八西舍競來問願姻夫妻佸烹羊煮衆命聚頭作淫殺含笑樂呵呵啼哭受殃決寒七十白頭人娶妻年二八婚姻既失時意氣何由佸豔婦不執刀衰翁多被殺夕陽在西山好與兒女決楚南方無垢女年歲登二八龍藏獻明珠寶生位已佸豈如花柳淫暗把英雄殺旦暮入泉臺妖魂受斷決石田舍多桑園牛犢滿廄轍肯信有因果頑皮早晚裂眼看消磨盡當頭各自活紙袴瓦作裩到頭凍餓殺寒慎勿登權門權門有覆轍李斯遭族夷蘇秦就車裂多結他人怨獨求自己活小人不容誅君子先去殺楚我看覆車人方蘇復蹈轍良弓卒就夷威骨終為裂歷歷千劫中勞勞幾時活如何不自珍輾轉受誅殺石我見百十狗個個毛鬇鬡臥者樂自臥行者樂自行投之一塊骨相與嘊喍爭良由為骨少狗多分不平寒貪夫計斗粟怒髮上鬇鬡志士心四海惟憂道不行鴟梟嚇腐鼠返恐鵷雛爭欲識曠蕩懷悠然如水平楚青青梅柳巷螳蜋勢鬇鬡俄驚車轍聲礫礫從傍行不量些微力鼓翅欲拒爭前轍死無悔後轍歎不平石極目兮長望白雲四茫茫鴟鴉飽腲腇鸞鳳飢倣徨駿馬放石磧蹇驢能至堂天高不可問鷦鷯在滄浪寒萬古一相望山川何渺茫撫心兮躑躅搔首兮倣徨明月混泥滓伯勞栖畫堂賢人不見用自古涕淋浪楚四望荒煙布塵昏接混茫人情安寢食吾道歎徊徨魑魅登高殿鳳凰棲草堂空山每念及涕淚一浪浪石洛陽多女兒春日逞華麗共折路邊花各持插高髻髻高花匌匝人見皆睥睨別求摻摻憐將歸見夫壻寒荒郊枯髑髏舊日如花麗對鏡寫蛾眉教人梳鳳髻嬌歌及豔舞側立兼傍睨一去不復還冥冥泣其壻楚美婦街頭走丰姿頗佳麗火榴妒長裙雲山挽新髻三市蹁躚行萬夫婉轉睨一朝珠翠沈誰肯為伊壻石春女衒容儀相將南陌陲看花愁日晚隱樹怕風吹年少從傍來白馬黃金䩭何須久相弄兒家夫壻知寒白日城東際紅妝水北陲尋春何處女障面不勝吹惹草縈羅帶穿花避玉䩭風前立不語此意有誰知楚何事東家女尋春走四陲繁花當路笑弱柳任烟吹蕩子青絲履王孫白玉䩭無言聊一盼意不恥人知石羣女戲夕陽風來滿路香綴裙金蛺蝶插髻玉鴛鴦角婢紅羅縝閹奴紫錦裳為觀失道者鬢白心惶惶寒女伴踏春陽名園百草香雙飛憐翡翠並立妒鴛鴦柳細風吹面花深露滴裳暮歸如有失間夢亦驚惶楚山寺襯河陽佳人燒願香身光飛孔翠步影動鴛鴦草鬬合歡帶花吹學舞裳不知春夢短老淚各愴惶石若人逢鬼魅第一莫驚懼捺硬莫采渠呼名自當去燒香請佛力禮拜求僧助蚊子叮鐵牛無渠下觜處寒鬼是人所為人正鬼亦懼鬼若異於人陰陽孰來去明知心自驚卻喚佛相助瞋喜在面門何曾離當處楚有客論無鬼見鬼必惶懼幼小讀中庸切身不可去孰令幽怪形而借神明助正直視吾心若曹無立處石浩浩黃河水東流長不息悠悠不見清人人壽有極苟欲乘白雲曷由生羽翼唯當鬢䰉時行住須努力寒寒暑去復來未知何時息嘗聞古老說天地有終極螻蟻保一身蠛蠓恃兩翼人心苟不妄本具大神力楚伊空立世界旋轉無暫息濁惡沈幽冥清真歸太極誰無三藏樞皆具六經翼文字縱筌蹄此中寓道力石乘兹朽木船采彼紝婆子行至大海中波濤復不止唯齎一宿糧去岸三千里煩惱從何生愁哉緣苦起寒向上無爺娘向下無妻子自語還自歌獨行又獨止人人我知識處處吾鄉里借問何以然佛種從緣起楚將軍噴虎威性命輕蘭子遇敵若為休交鋒不可止枕戈守一隅帶甲奔千里眨眼死刀頭來生再殺起石默默永無言後生何所述隱居在林藪智境何由出枯槁非堅衛風霜成夭疾土牛耕石田未有得稻日寒先聖既有作後賢可無述如磨古銅鏡塵去光自出一念成佛人飄風未為疾現前不了悟浮雲掩白日楚山水道之華于豫成著述非天舌本窮借我筆端出寧使煙霞痼且消文字疾林泉浣古心蒼靄浴紅日石山客心悄悄常嗟歲序遷辛勤采芝朮搜斥詎成仙庭廓雲初卷林明月正圓不歸何所為桂樹相留連寒苦樂隨時改形骸與化遷未能拋富貴何處覓神仙地發金鐘響潭開玉鏡圓世人空悵望惟見嶺雲連楚流水行雲處因之見不遷有心皆作佛無事即為仙悟世微塵窄窺天一鏡圓頽然形影外惟與道相連石有人坐山陘雲袞兮霞纓秉芳兮欲寄路漫兮難征心惆悵狐疑年老已無成衆喔咿斯蹇獨立兮忠貞寒直道兮為陘芳心兮結纓求賢兮不得躡影兮孤征路遠兮難致神勞兮何成太虛兮寥廓金石兮堅貞楚子游兮野陘蘭芷兮為纓衆鳥兮烟起孤鶴兮雲征佳人兮不至好夢兮難成于心兮玉潔于志兮石貞石猪喫死人肉人喫死猪腸猪不嫌人臭人反道猪香猪死拋水內人死掘地藏彼此莫相喫蓮花生沸湯寒寧食自己肉莫攪他人腸止殺可延壽改過勝燒香人欲殺猪時猪走無處藏死後墮地獄身先投鑊湯楚陽世作屠戶陰司拔肺腸莫言猪肉好須信菜根香故殺壽終促清齊福久藏滿腔蓮漏水難入沸爐湯石快哉混沌身不飯復不尿遭得誰鑽鑿因兹立九竅朝朝為衣食歲歲愁租調千個爭一錢聚頭亡命叫寒不見木傀儡何嘗遺屎尿高低逐線索動靜因關竅渠本無愛憎他來任嘲調分明幕裏人代作啾啾叫楚謬說佛法者分明運屎尿不知宗教源山海同其竅毛髮有差訛黑風吹鬼調不為野干鳴便作蝦蟇叫石啼哭緣何事淚如珠子顆應當有別離復是遭喪禍所為在貧窮未能了因果冢間擔死尸六道不欣我寒渴時飲水漿飢來吞飯顆但貪生處樂不究死時禍先要斷惡緣次宜營善果了然見法王從此除人我楚生猶托橡實死亦艱蓬顆不以善鍾祥而為惡釀禍種麻豈得稻樹栗終成果此說甚分明爾毋辜負我石婦女慵經織男夫懶耨田輕浮耽挾彈趾屣拈抹絃凍骨衣應急充腸食在先今誰念於汝痛苦哭蒼天寒學道猶貪富為僧好買田利名忙似箭生死急如絃作福居人後隨邪在衆先鑽頭入古井仰面望青天楚學地貴英實如秋秀稻田悟禪若跳枕調性似和絃臨事宜思後當仁不讓先始終無所失言行利人天石不行真正道隨邪號行婆口漸神佛少心懷嫉妒多背後噇魚肉人前念佛陀如此修身處應難避奈何寒須知真極樂不離此娑婆水樹談玄久山禽念佛多參隨假菩薩蹉過活彌陀欲步金蓮去其如未徹何楚可笑少年婦同羣癡賣婆閒行念佛少聚首說人多買紙遊天竺燒香過普陀原非真實意災障卻如何石世有一等愚茫茫恰似驢還解人言語貪淫狀若猪險敧難可測實語卻成虛誰能共伊語令教莫此居寒衆生色所愚喚作墜車驢三業不清淨還同碾屎猪從來神識暗反謂佛言虛地獄方將入天堂未肯居楚昔人負業債償報一頭驢菩薩度生切現身曾作猪頑皮等蒙昧道眼本空虛何故髑髏人穹廬為隱居石有漢姓傲慢名貪字不廉一身無所解百事被他嫌死惡黃連苦生憐白蜜甜喫魚猶未止食肉更無厭寒必以身心淨當於口齒廉空門魚肉臭暗室鬼神嫌稟戒情無礙餐蔬味自甜為僧最可惡飲酒夜厭厭楚有士用謙謙名清字愛廉讀書多聖解作事少人嫌聞道生無苦安心死亦甜悠游天外想何對又何厭石卜擇幽居地天台更莫言猿啼溪霧冷嶽色草門連竹葉覆松室開池引澗泉已甘休萬事采蕨度殘年寒曾到幽居否心知不在言千峰雲影接萬壑樹聲連鉢有松花粉崖多瀑布泉無人同道味幸自樂吾年楚諸子著高論依余忘世言芟雲松節古洗石竹根連爾志在寒月吾心如冷泉因時發一曲追和上皇年石益者益其精可名為有益易者易其形是名為有易能益復能易當得上仙籍無益復無易終不免死厄寒本來無一物必竟何損益人壽有短長虛空無移易身遭因果縛名落生死籍八萬大劫終神仙詎逃厄楚庸人不自損我以損為益庸人恐易之我以易不易有益而損之那得生死籍不易而易之何處是苦厄石徒勞說三史浪自看五經洎老檢黃籍依前注白丁筮遭連蹇卦生主虛危星不及河邊樹年年一度青寒有人尋佛教凝坐誦禪經不肯求諸己徒勞識一丁茫然紙上語默若霧中星指出西來意春山疊疊青楚至文不加點莫自詡窮經道不滯三乘力安用五丁畫前焉有易悟後亦非星落落見真意巖巖眉欲青石碧澗泉水清寒山月華白默知神自明觀空境逾寂寒眼將山共青心與月俱白魚戲水自間鳥鳴林轉寂楚前山山氣青後海海雲白鳥語本非喧猿啼真是寂石我今有一襦非羅亦非綺借問作何色不紅亦不紫夏天將作衫冬天將作被冬夏遞互用長年只者是寒虛心絶嗜欲實語無文綺不學諸凡夫誇張金與紫真空作牀座妙有為衣被過去佛盡然當來亦如是楚傳來千佛衣條律如文綺雜采交光明爛于恩賜紫三賢藉此遮七聖以兹被學道之禪人必當尊敬是石白拂栴檀柄馨香竟日聞柔和如卷霧搖曳似行雲禮奉宜當暑高提復祛塵時時方丈內將用指迷人寒至境離名相將何作見聞閒拋手中拂坐對嶺頭雲朗月非標指清風自掃塵點頭猶有石掩耳更無人楚至道若為說於兹示見聞手邊霏玉雪言下雨珠雲微指徵羣妄高揮絶點塵當年一喝下千載鼓聾人石貪愛有人求快活不知禍在百年身但看陽焰浮漚水便覺無常敗壞人丈夫志氣直如鐵無曲心中道自真行密節高霜下竹方知不枉用心神寒當知歷劫金剛體即是浮泡夢幻身猪肉案頭明底事龍華會上待何人於中措意乖玄旨直下忘言達本真未悟終難安穩坐三登九到且勞神楚微塵堆裏三乘法泡影波中諸佛身夢破峰前所有境道明眼下已無人空來畢竟還歸實幻了何勞更說真目送遠山疏樹外天高雲散獨馳神石多少般數人百計求名利心貪覓榮華經營圖富貴心未片時歇奔突如煙氣家眷實團圓一呼百諾至不過七十年冰消瓦解置死了萬事休誰人承後嗣水浸泥彈丸方知無意智寒方袍圓頂人多失出家利佛棄金輪王何曾戀榮貴子孫不唧個個無英氣天子詔且辭庶人呼即至唯貪衣與食溫飽百事置小輩作交朋狂徒為法嗣閻羅使者來然後分愚智楚采采山中薇豈同人世利世人無路來誰與論尊貴花木適性靈陰晴看山氣雲不呼自來月不邀自至機不在迅截用不在鈍置此意豈人知我言為我嗣聊爾託巖阿絶聖而棄智石貪人好聚財恰如梟愛子子大而食母財多還害己散之即福生聚之即禍起無財亦無禍鼓翼青雲裏寒吾觀聚斂僧不及盜家子盜損己利他僧損他利己善惡粲然分吉凶從此起蒼蠅案上立心在糞堆裏楚寄語參學人毋認賊為子子未盡偷心母當終纍己法財長復銷妄想滅還起更不發深省績麻荊棘裏石去家一萬里提劒擊胸奴得利渠即死失利汝即殂渠命既不惜汝命有何辜教汝百勝術不貪為上謨寒寧為市義客勿作守錢奴錢散義即聚財多身乃殂黃金難免死白璧易招辜無備行險道其誰為爾謨楚武士嫺韜略何如為佛奴功成閣上畫戰敗刀頭殂苟不希榮寵何由罹罪辜應懷竺乾史萬古勒為謨石瞋是心中火能燒功德林欲行菩薩道忍辱護瞋心寒遊戲虛空藏莊嚴智慧林一毫無欲念萬事不欺心楚以瞋為佛事雷動筍成林雨歇雲開後清光何處心石汝輩埋頭癡兀兀愛向無明羅剎窟再三勸你早修行是你頑癡心恍惚不肯信受寒山語轉轉倍加業汩汩直待斬首作兩段方知自身奴賊物寒人我如山高突兀中有四蛇同一窟不持寸刃能斬之頓使形神超恍惚人我轉作內外空更無世間塵土汩世間出世得自在逆順縱橫是何物楚活卓青獅睡兀兀乾坤浩蕩藏鋒窟風梳石髮勢猙獰氣噴雲根像恍惚覆爪香侵花草深奮身影與烟霞汩有時吼破太虛空百怪愕然如喪物石惡趣甚茫茫冥冥無日光人間八百歲未抵半宵長此等諸癡子論情甚可傷勸君求出離認取法中王寒無始墮蒼茫何由發智光人間憂日短地下恨時長外道癡尤甚天魔毒自傷直須收六國處處奉君王楚寤寐陰陽復相須一道光情癡嫌刻短苦極恨年長不察天時度翻將人理傷冥盲坐暗室何日悟心王石天高高不窮地厚厚無極動物在其中憑兹造化力爭頭覓飽暖作計相噉食因果都未詳盲兒問乳色寒萬水朝東溟衆星拱北極悠悠天地間畢竟承誰力虎豹能食人魚蝦為人食何嘗噉空虛總不離形色楚有曰空之宗無乃數之極毫末成花種普天歸帝力禽魚自飛躍男女安衣食奇哉造化工一氣吞五色石天下幾種人論時色數有賈婆如許夫黃老元無婦衛氏兒可憐鍾家女極醜渠若向西行我便東邊走寒無時因有無有處緣無有日月成晦朔陰陽配夫婦非粗不辨細見好方知醜地上瀉水銀一任東西走楚無之不可無有者如何有昨見馬上郎娶歸園中婦初年貌如花老去顏多醜緊縛不是繩步步隨他走石賢士不貪婪癡人好爐冶麥地占他家竹園皆我者努膊覓錢財切齒驅奴馬須看郭門外壘壘松柏下寒天地一鴻爐萬物付陶冶同在槖籥中孰為呼吸者得鹿反失鹿失馬卻得馬如看畫壁人特地分高下楚別有煅鍊才總歸一大冶推出無位人打徹癡禪者辨虎兼辨龍呼牛復呼馬此間是何境擬議非高下石嗊嗊買魚肉擔歸餧妻子何須殺他命將來活汝己此非天堂緣純是地獄滓徐六語破堆始知沒道理寒買肉又買魚養妻兼養子脂膏在他身罪過歸自己可惜七尺漢竟成一團滓死後入地獄生前昧天理楚常觀萬物生亦復有妻子而忍破其羣以圖肥自己既調五味和旋棄八珍滓業報在陰山輪回有定理石有人把椿樹喚作白栴檀學道多沙數幾個得泥丸棄金卻擔草謾他亦自謾似聚沙一處成團也大難寒財物聚必散智人乃行檀如將泥彈子換彼黃金丸寸草不肯捨凡夫甘自謾使居輪王位一切施更難楚事多不可解養棘而伐檀怪看壺唾馬術尚劒藏丸雖見邪風長何愁正法謾妖狐臨古鏡醜狀避應難石蒸沙擬作飯臨渴始掘井用力磨碌甎那堪將作鏡佛說元平等總有真如性但自審思量不用閒爭競寒作善如登梯造惡如入井持戒如守城坐禪如磨鏡千般出心地一等明佛性聖者常自修凡夫好爭競楚迢迢平直路故故投深井失眼換魚珠怖頭逃鵲鏡瞪昧幻形隔殼猜真性一擊碎虛空問君何處競石推尋世間事仔細總要知凡事莫容易盡愛討便宜護即弊成好毀即是成非故知雜濫口背面總由伊冷暖我自量不信奴脣皮寒參禪捷徑法要自忘所知先不昧因果次令識幾宜無念念莫守有念念成非伊今正是我我今不是伊從頭盡剗卻何用存毛皮楚世出世間法咸當歸正知遣魔律所尚旌善史稱宜權在分輕重機忘截是非本來無相狀何得邈名伊讒言同啄木徒鼓一張皮石蹭蹬諸貧士飢寒成至極閒居好作詩札札用心力賤人言孰采勸君休歎息題安糊餅上乞狗也不喫寒今時學道人未困先疲極無量劫修行皆由勇猛力中心自勉強前進勿休息初種蟠桃枝果熟乃可喫楚懶殘不拭涕精勤何至極若作懶字看便非知道力永明非不墮五欲先知息二老可同參如飢得飯喫石欲識生死譬且將冰水比水結即成冰冰消返成水已死必應生出生還復死冰水不相傷生死還雙美寒心法自然真世間無可比乍同摩尼珠又似清淨水若但著語言何由出生死百非俱𠞰絶諸佛咸稱美楚虛空不可量大海若為比毋以管窺天莫將蠡測水魚通文字活龍鬬劒環死世眼雖重明無能得盡美石尋思少年日遊獵向平陵國使職非願神仙未足稱聯翩騎白馬喝兔放蒼鷹不覺今流落皤皤誰見矜寒當年可作樂莫待老侵陵少壯人所羡英雄誰不稱臨餐獰似虎使氣捷如鷹一夜髮盡白粗豪空自矜楚獨影弔荒野青天鬼哭陵首陽名尚在東海德無稱邱穴走蒼猯松楸啄怪鷹生前不蠠沒死後孰哀矜石偃息深林下從生是農夫立身既質直出語無諂諛保我不鑒璧信君方得珠焉能同泛灩極目波上鳧寒幾般聲與色專只誑愚夫自不省己過人皆來面諛龍泉雜鈍鐵魚目混明珠苦海方流蕩身同泛泛鳧楚緑竹名君子青松稱大夫節高竿尚直皮老面無諛清露潤琅碧名言吐玉珠可思不可見遠水照晨鳧石不須攻人惡不須伐己善行之則可行卷之則可卷祿厚憂責大言深慮交淺聞兹若念兹小兒當自見寒惡者從他惡善者從他善善惡都莫分從他自舒卷舒來大地闊卷來滄溟淺伎倆有盡時無窮不聞見楚既不思為惡亦無心作善死生同夢觀罪福如雲卷若使我山高便知學海淺古今一貫之於此明真見石富兒會高堂華燈何煒煌此時無燭者心願處其傍不意遭排遣還歸暗處藏益人明詎損頓訝惜餘光寒貧富各有死富者徒輝煌錦繡蓋棺上笙簫盈路傍貧家雖冷落土穴同埋藏一入黃泉去何由見日光楚富翁居華屋雕棟花修煌貧者住茅屋參差在道傍可憐兵火慘大小沒囊藏棲泊竟無所哀哀泣露光石世有聰明士攻苦探幽文三端自孤立六藝越諸君神氣卓然異精采超衆羣不識個中意逐境亂紛紛寒有客高當世潛心學綴文廟堂思輔主巖谷比徵君議論才無盡吟哦句不羣惜哉輕佛法口業太紛紛楚靜入昆蟲性微思成至文蜂餐知報國蟻食敢忘君出處常分序飛行不亂羣人為萬物首奚忍各紛紛石層層山水秀煙霞鎖翠微嵐拂紗巾濕露霑蓑草衣足躡遊方履手執古藤枝更觀塵世外夢境復何為寒地僻無人到苔深一徑微松間縛茅屋竹上掛蒲衣靜看青山朵閒拈白拂枝焚香作茗事此外更何為楚山響發清慧泉聲語細微松風吹茗火竹陰透禪衣拭硯雲開石臨書鳥下枝物情為我轉轉處見無為石滿卷才子詩溢壺聖人酒行愛觀牛犢坐不離左右霜露入茅簷月華明甕牖此時吸兩甌吟詩三兩首寒不說無事禪不飲無名酒青山在吾左流水在吾右芳草生滿庭白雲飛入牖從來只麼閒倏忽成皓首楚石根流乳泉味不讓天酒青山遮屋頭白雲來座右奇書開古倉高唱響空牖杯茗獨斟之瓶花相並首石施家有兩兒以藝干齊楚文武各自備託身為得所孟公問其術我子親教汝秦衛兩不成失時成齟齬寒農夫勞四肢久坐即酸楚公子美粱肉啖虀為失所野人樂深禪蔬果吾愛汝使各捐故習未免相齟齬楚今非戰國時朝秦而暮楚英雄一委身沒世在其所德祐自興亡義熙相爾汝此為守道人吾法無齟齬石止宿鴛鴦鳥一雄兼一雌銜花相共食刷羽每相隨戲入煙霞裏宿歸沙岸湄自憐生處樂不奪鳳凰池寒野鴉身弊惡亦復有雄雌粲粲鴛鴦鳥行藏無不隨梳翎紫潭上宛頸碧溪湄何羡雲鵬翼搏風朝夕池楚溪上游鸂鶒閒關雄與雌飛鳴何自在來去每相隨莎草鋪青岸萍花沾緑湄芳春情正戀忘卻華清池石或有衒行人才藝過周孔見罷頭兀兀看時身侗侗繩牽未肯行錐刺猶不動恰似羊公鶴可憐生懵懂寒羊祜五歲時探環桑樹孔前生明皎潔後世直儱侗儒者或有疑聞之心亦動釋尊說因果實為開懵懂楚安得佛圖澄夜光生腹孔委身縱入夷出語多能侗每使殺機回屢消惡意動二張積纍勤事物何懵懂石少小帶經鉏本將兄共居緣遭他輩責剩被自妻疏拋絶紅塵境常遊好閲書誰惜一斗水活取轍中魚寒陶生自荷鉏晚與五兒居跡向東林近心將上國疏有田多種秫無事好觀書本絶功名念臨淵不羡魚楚逃名志學鉏野性託幽居牆角孤梅老門前五柳疏心中無俗纍身外有藏書每向青溪坐垂綸不釣魚石變化計無窮生死竟不止三塗鳥雀身五嶽龍魚己世濁作羺䍲時清為騄駬前回是富兒今度成貧士寒車輪生四角行客心未止堯舜尚為名巢由不忘己龍中多蝘蜓馬外無騄駬亂世奸邪人太平雄俊士楚寰寰一大輪善惡何時止凡濁未忘身聖賢能舍己世資豢犬羊道駕疾驪駬勿使蓬心人反嗤夜糴士石書判全非弱嫌身不得官銓曹被拗折洗垢覓瘡瘢必也關天命今年更試看盲兒射雀目偶中亦非難寒世亂防邊將時危納粟官征夫多作鬼戰馬得辭瘢寵贈真何用名旌只好看不因兵革苦那識利名難楚讀書嘗下第援例輒為官心有蓬茆塞身無刀箭瘢煤山劒上恨金匱畫中看可歎謀臣輩仍然善死難石貧驢缺一尺富狗剩三寸若分貧不平中半富與困始取驢飽足卻令狗飢頓為汝熟思量令我也愁悶寒世間貴與賤相去不能寸貴者隨心成賤者作事困外物安可必前生預排頓不如兩置之肚裏無憂悶楚余觀苦與樂總屬人方寸淡泊享清安貪婪致飢困爭名道德衰好戰甲兵頓不若至無為淳淳而悶悶石柳郎八十二藍嫂一十八夫妻共百年相憐情狡猾弄璋字烏䖘擲瓦名婠妠屢見枯楊荑常遭青女殺寒天下不如意恆十居七八我此閻浮洲地頑人性猾只欺瘦竛𥪁偏愛肥婠妠積惡無所逃終是惡合殺楚老矣秦樓女長年稱二八商人買作妻情性太輕猾猶逞美姿姿以當肥妠妠精神暗裏消不在執刀殺石赫赫誰壚肆其酒甚濃厚可憐高幡幟極目平升斗何意訝不售其家多猛狗童子若來沽狗咬便是走寒為人不愛錢生計何由厚若學貪汙輩黃金堆到斗身雖著衣服行不如猪狗一似瞎獼猴隨他驢隊走楚營營富貴人資性不忠厚心計高于山金珠量于斗紀綱僮僕千不異看家狗大樹一朝崩猴猻各自走石吁嗟濁濫處羅剎共賢人謂是荒流類焉知道不親狐假獅子勢詐妄卻稱真鉛礦入爐冶方知金不精寒近日為僧者皆非貧道人枇杷樹子葉認作馬家親開口說相似到頭心不真借衣誑檀越正是野狐精楚世亂見忠孝時艱念道人犬恩尚戀主鳥善不忘親慨論事何險悲歌恨亦真獨慚獵隱者衣食敢求精石田家避暑月斗酒共誰歡雜雜排山果疏疏圍酒樽蘆萷將代席蕉葉且充盤醉後搘頤坐須彌小彈丸寒富至雖云樂貧家亦有歡門開當大野客至倒深樽就把青荷葉鋪為碧玉盤浮生如過鳥急景似跳丸楚山居別有致雲物自呈歡軟草長為座鮮花時在樽香泉煮石鼎野果鬬磁盤無事登巖首雙眸送兩丸石個是何措大時來省南院年可三十餘曾經四五選囊裏無青蚨篋中有黃卷行到食店前不敢暫回面寒鮮衣美少年飽食閒庭院父母使讀書朝廷待開選裝囊千餘金述作滿一卷準擬買試官攙先求字面楚歙州程秀才借席苕溪院氣志本陵霄文章曾入選如何奇寶光僅作副圍卷再舉圖天飛朝廷已改面石大有飢寒客生將獸魚疏長存廟石下時笑路邊隅纍日空思飯終冬不識襦唯齎一束草并帶五升麩寒孝廉逢世薄交友為財疏寂寂同孤影煢煢守一隅仰看雲裏雁誰贈雪中襦縱得真金屑緣貧化作麩楚貧士無長策交遊親亦疏相逢遮半面獨哭動三隅煮字難為粥披衣罷作襦胸中成錦繡棄置等青麩石浪造凌霄閣虛登百尺樓養生仍天命誘讀詎封侯不用從黃口何須厭白頭未能端似箭且莫曲如鈎寒簇簇車馬地重重歌舞樓兒皆尚公主女盡嫁王候一旦長伸腳頻呼不轉頭寧知前去路只有業交鈎楚處處看花地時時在畫樓詩騷通爾汝杯斝動公候無幾春生頰俄然雪滿頭釣竿閻老手難免上他鈎石雲山疊疊連天碧路僻林深無客遊遠望孤蟾明皎皎近聞羣鳥語啾啾老夫獨坐棲青嶂少室間居任白頭可歎往年與今日無心還似水東流寒晨昏但見雲霞起杖屨惟隨麋鹿遊野色山光同闃寂車輪馬足省喧啾從他鏡裏添霜草暢我林間坐石頭無限英雄生又死奈何日月去如流楚一生祇會夾山景每到千峰恣獨遊青嶂白猿銜月走疏林翠鳥帶風啾辨音莫向人謀耳得句先須自點頭不覺理窮聲色斷落花無語送長流石富貴疏親聚只為多錢米貧賤骨肉離非關少兄弟急須歸去來招賢閣未啓浪行朱雀街踏破皮鞋底寒何以禦凶荒黃金不如米有米復有金四海皆兄弟世亂風土薄人貧盜心啓姦諛九天上正直深溝底楚有弟也有兄有錢也有米無錢無米時無兄亦無弟汝貧到人家報道門未啓汝富坐在家人來捧腳底石我見一癡漢仍娶三兩婦養得八九兒總是隨宜手丁戶是新差資財非舊有黃檗作驢鞦始知苦在後寒苦哉摩訶羅破戒私置婦官納田地租家充弓弩手死生無人替財物為他有業鏡在面前尾把插背後楚鄰庵有一僧還俗娶少婦賣卻福田衣鋤犁長在手姻緣誠偶然廬舍原非有牛尾縛乾柴火來業在後石新穀尚未熟舊穀今已無就貸一斗許門外立踟蹰夫出教問婦婦出遣問夫慳惜不救乏財多為纍愚寒谷響雖似有電光忽然無人生何異此不得久踟蹰既旦還復暮如妻必對夫千齡同一盡未用相賢愚楚石火無為有水鹽有得無萬物亦如此名相強踟蹰緩急見儕輩窮通明丈夫誰云同一壑不復辨賢愚石大有好笑事略陳三五個張公富奢華孟子貧轗軻只取侏儒飽不憐方朔餓巴歌唱者多白雪無人和寒重義輕王候萬中無一個他人願安樂自己甘轗軻雖若晉楚富不如夷齊餓呦呦鹿鳴篇我唱君可和楚榮榮食祿者死節無多個月在雲迷天車行石接軻晚花蝶夢寒秋柳蟬聲餓高操起頽風後來寧寡和石老翁娶少婦髮白婦不耐老婆嫁少夫面黃夫不愛老翁娶老婆一一無棄背少婦嫁少夫兩兩相憐態寒兒侵父母財在上須寬耐父母借兒錢不還傷所愛聖賢教尊卑義利分向背餓狗爭骨頭人為畜生態楚靜者性柔和鬧者性不耐鬧即貨利趨靜將山水愛兩兩各自為一一無所背靜鬧一處居便多可笑態石雍容美少年博覽諸經史盡號曰先生皆稱為學士未能得官職不解秉耒耜冬披破布衫蓋是書誤己寒從小為近臣未嘗讀經史本非卿相才翻傲文學士折獄不以書耕田正無耜斯民得財貨財貨終害己楚博達古今書才如顛長史兒孫各俊英祖父皆卿士甲第列千門良田開萬耜財多誨盜淫殃纍歸諸己石可笑五陰窟四蛇同處居黑暗無明燭三毒遞相驅伴儅六個賊劫掠法財珠斬卻魔軍輩安泰湛如酥寒古今無二道魔佛亦同居住相遭魔罥觀空被佛驅水中偏得火衣內不珠酪本全拋卻誰來問熟酥楚汪汪大宇宙勿謂苟然居身正天神護心邪鬼使驅亡猿殘萬木瘥鶴獻雙珠德味誠哉重馨香如美酥石畫棟非吾宅青林是我家一生俄爾過萬事莫言賒濟渡不造筏漂淪為采花善根今未種何日見生芽寒樂甚無為國蕭然不住家都忘山色好轉覺世情賒六月炎天雪三冬枯木花早來塵纍盡何處發根芽楚天地為廬舍鴻濛成一家歲時隨分過山水興偏賒披衲增雲結加餐煮雪花恬然無別事靜默護蘭芽石出生三十年常遊千萬里行江青草合入塞紅塵起鍊藥空求仙讀書兼詠史今日歸寒山枕流兼洗耳寒吾年六十餘自少離鄉里謝事片時間推心何處起焚香讀經律染翰修僧史且莫徇浮名人生行樂耳楚停機復𫎓思彈指已千里直使迅雷崩那容浮瘴起平酬入野謳公斷如良史聲色未分時圓通無眼耳石世有多事人廣學諸知見不識本真性與道轉懸遠若能明實相豈用陳虛願一念了自心開佛之知見寒我有一面鏡照之無不見中虛忘彼此外物齊近遠老幼各隨形妍媸皆滿願夜深掛高堂更是何人見楚五色惑人眼所見即非見彼執幻色故知近未知遠若能離見見處處大悲願一室懸明珠大地無不見石鳥弄情不堪其時臥草庵櫻桃向杳杳楊柳正毿毿旭日銜青嶂晴雲洗緑潭誰知出塵俗馭上寒山南楚白日誰扃戶青山自繞庵爐香雲淡淡鬢影雪毿毿鶴舞千尋樹龍吟萬丈潭蕭然坐深夜見月出東南楚不負梅花約而來住破庵蓬窗蒼霰入紙被雪花毿崖倒寒冰樹雲深冷石潭此時燒榾柮吾道在江南石昨日何悠悠場中可憐許上為桃李徑下作蘭蓀渚復有綺羅人舍中翠毛羽相逢欲相喚脈脈不能語寒歲歲送春歸春歸定可許芙蓉滿池沼杜若生洲渚衰鬢忽驚秋飛光如插羽欲求身後名個是間言語楚春日正遲遲游車驕自許桃花迎遠村楊柳拂清渚魴鯉躍金鱗鴛鴦交錦羽詩人縱曠觀安得竟無語石丈夫莫守困無錢須經紀養得一牸牛生得五犢子犢子又生兒積數無窮已寄語陶朱公富與君相似寒人心剎那間生滅不可紀歷劫受輪回無明為種子貪財殊未歇長惡何由己若欲識其源如身影相似楚陰司善惡籍名字不勝紀張三為虎兒李四作羊子生死既未休輪回那得已一人破情見萬類誰相似石之子何遑遑卜居須自審南方瘴癘多北地風霜甚荒陬不可居毒川難可飲魂兮歸去來食我家園椹寒成佛非外求勸君當內審從初放逸生積久昏迷甚木葉衣可穿茅端酒莫飲道眼若未明報作檀家椹楚寢食尋常事亦宜內自審夢來覺匪遲覺後夢猶甚至性通飢餐真心見渴飲君看萬樹桑為結長生椹石昨夜夢還鄉見婦機中織駐梭若有思擎梭似無力呼之回面視況復不相識應是別多年鬢毛非舊色寒如人臥一牀夢想交相織正欲渡河去忽因乘舟力覺來念篙師兩個元不識石女問木郎虛空作何色楚夢中偶看月五采霞光織織女下階來不借雲之力問我是何名我答云不識松風忽吹來紅日映窗色石人生不滿百常懷千載憂自身病始可又為子孫愁下視禾根土上看桑樹頭稱槌落東海到底始知休寒總為無錢悶錢多始是憂積來常恐盜散去又添愁護己蛇蟠窟嫌人鱉縮頭未言他世苦已覺此生休楚無田固是苦有産亦常憂富者艱嗣恨貧者多子愁東家少杓柄西舍沒鋤頭何日俱齊備忙忙死未休石世有一等流悠悠似木頭出語無知解云我百不憂問道道不會問佛佛不求子細推尋著茫然一場愁寒教君放下著不肯暫回頭只道身長在那知死可憂自今須猛省從此莫貪求好個天真佛逍遙有甚愁楚勤抱栴檀樹從他強出頭問心能不愧臨事可忘憂明日來誰在浮雲去不求笑看高座者心戰暗生愁石董郎年少時出入帝京裏衫作嫩鵝黃容儀畫相似常騎白雪馬拂拂紅塵起觀者滿路傍個是誰家子寒有一好郎君常居闤闠裏論花花弗如比雪雪難似白月當天耀清風匝地起惟聞古者言不識誰家子楚何宅俊兒郎閒來名苑裏面圓水月如手秀蓮花似聞善身先拜見賢心奮起出言偏有序真是成家子石個是誰家子為人大被憎癡心常憤憤肉眼醉瞢瞢見佛不禮佛逢僧不施僧唯知打大臠除此百無能寒不失沙門樣何妨俗子憎狼心徒狠狠狗眼任瞢瞢一鉢檀家飯孤雲野鶴僧只談心地法堪繼嶺南能楚小兒無骨氣閒戲也人憎作事不聰敏發言多憒瞢昨看為濫丐今見作頑僧經典何曾識偏于酒肉能石人以身為本本以心為柄本在心莫邪心邪喪本命未能免此殃何言懶照鏡不念金剛經卻令菩薩病寒挽弓挽其絃執斧執其柄斷欲斷其心拌死拌其命佛是大醫王法為圓滿鏡一照爍羣昏一丸消萬病楚身從無相生心豈可為柄想納故承胎蘊深而受命全聲歸普門雜色交圓鏡衆生繫其中諸佛憂成病石城北仲家翁渠家多酒肉仲翁婦死時弔客滿堂屋仲翁自身亡能無一人哭喫他杯臠者何太冷心腹寒錢氏有勢時路人如骨肉一朝逢破敗百鬼瞰其屋弟死兄不葬夫亡婦不哭皆由積惡深餘禍延遺腹楚勢家貴快心那痛他身肉東郭占田莊西村拆樓屋彼情不可伸此怨只聞哭白日化冰山鼴鼠齊滿腹石下愚讀我詩不解卻嗤誚中庸讀我詩思量云甚要上賢讀我詩把著滿面笑楊修見幼婦一覽便知妙寒我詩非俗語俗子徒嘲誚既不說利名又不干權要得句有誰知臨風恆自笑可喜復可愕無玄亦無妙楚道人自作詩讀者任嘲誚幾輩謂平常數家矜典要豈期世俗知但向山靈笑適性偶吟之有何妙不妙石自有慳惜人我非慳惜輩衣單為舞穿酒盡緣歌醉常取一腹飽莫令兩腳儽蓬蒿鑽髑髏此日君應悔寒凡曰剃髮人後先非一輩資財逐日貪酒肉從頭醉遍造僧中惡無疑地下儽如來有方便教汝勤懺悔楚俯察天地間庸夫無數輩囊錢似虎爭角酒如泥醉生犯王臣訶死遭獄主儽慈悲仍放還惘惘不知悔石我行經古墳淚盡嗟存沒冢破壓黃腸棺穿露白骨欹斜有瓮瓶振撥無簪笏風至攬其中灰塵亂𡋯𡋯寒天地會有終人生要當沒無因駐少年未免成枯骨卜地置墳塋全身葬袍笏焉知數世後耕者翻泥𡋯楚吾常弔古墳老樹荒雲沒枯葉蓋黃土青苔生白骨誰為九院燈誰是一門笏回首歎茫然風塵互𡋯𡋯石夕陽下西山草木光曄曄復有朦朧處松蘿相連接此中多伏處見我舊迅鬣手中無寸刃爭不懼懾懾寒富家造生墳樓觀何暐曄疊石作高牆通川與渠接多栽花數本賸種松七鬣葬不逾三年廢蕩令人懾楚何如尊宿家不慕光塵曄那有虎威戕曾無鬼趣接觀心成水國舉指生火鬣遊戲在人間境緣安所懾石出身既擾擾世事非一狀未能捨流俗所以相追訪昨弔徐五死今送劉三葬日日不得閒為此心悽愴寒死者何所歸誰能問其狀子孫亦流落閭里難再訪個個嫌宅基人人罪埋葬良由德不修使我心惻愴楚自不為生謀終當見死狀泉臺何處歸故舊無人訪一哭向靈牀三杯澆野葬茫茫萬古魂弔影獨酸愴石有樂且須樂時哉不可失雖云一百年豈滿三萬日寄世是須臾論錢莫啾唧孝經末後篇委曲陳情畢寒先師有遺訓守之不可失勿云滅度久常存平居日山鳥啼空空野鼠叫唧唧言是行乃非苦輪何由畢楚叮嚀學道人無事勿相失花間襯緑雲松頭落紅日春深鳥語頻秋老蟲聲唧曉了此中玄可云參學畢石獨坐常忽忽情懷何悠悠山腰雲漫漫谷口風颼颼猿來樹嫋嫋鳥入林啾啾時催鬢颯颯歲盡老惆惆寒無事晝寂寂不眠夜悠悠雜花春爛爛喬木夏颼颼霜曉鶴踽踽雪晴猿啾啾此心坦蕩蕩何必懷惆惆楚心中常落落世外任悠悠春山花棣棣秋樹葉颼颼雲門雁肅肅石壁蟲啾啾此際獨灑灑切莫空惆惆石一人好頭肚六藝盡皆通南見趁向北西見趁向東長漂如泛萍不息似飛蓬問是何等色姓貧名曰空寒獼猴一舍住窈窕六窗通不限內與外無妨西復東貪來心似火老去鬢如蓬善惡俱無礙皆由本性空楚松際結船屋六窗齊豁通烟雲或上下日月自西東急影送流水飛光如轉蓬靜觀萬象外雲洗一輪空石他賢君即受不賢君莫與君賢他見容不賢他亦拒憐善矜不能仁徒方得所勸逐子張言拋卻卜商語寒安危本自致禍福非他與小輩數相親忠言多見拒三尊不自歸六極先為所勸作有義事勿談無義語楚善惡惟人召異同非物與衆形見合離一念分迎拒亂況已彌天忍心不作所乃遺鄒魯言而教鮮卑語石俗薄真成薄人心個不同殷翁笑柳老柳老笑殷翁何故兩相笑俱行譣詖中裝車競嵽嵲翻載各瀧涷寒來往無量劫受身安得同昨朝為稚子今旦作衰翁不出因果內常淪生死中未能超彼岸爭奈腳瀧涷楚日月人皆共謀生未必同嶮崎官路馬潦倒野村翁不道常情裏安知異類中一言天地動晴雹灑塵涷石是我有錢日恆為汝貸將汝今既飽暖見我不分張須憶汝欲得似我今承望有無更代事勸汝熟思量寒白衣施僧物今日返持將官吏加箠楚誅求蝟毛張買田固不廉流血非所望先帝特蠲役聖恩何可量楚此身誠乃寄長物況堪將相彼守錢虜胡為高氣張有無情不接親友怨相望時事滄桑變生前未可量石人生一百年佛說十二部慈悲如野鹿瞋怒似家狗家狗趕不去野鹿常好走欲伏獼猴心須聽師子吼寒人間一念惡便屬閻羅部兩手無寸刃何以制鐵狗火逼寒風吹顛狂四邊走號呼痛切時個是誰音吼楚虛空大文章函蓋乾坤部點墨化雙龍看雲變蒼狗鉢底山河藏胸中日月走猛風吹古嵐草木知哮吼石教汝數般事思量知我賢極貧忍賣屋才富須買田空覆不得走杭頭須莫眠此言期共見掛在日東邊寒有個安樂法傳從諸聖賢但能依佛訓何用置民田飢至托鉢食困來伸腳眠絲毫念不起受用福無邊楚杖履經過處論交山最賢一餐隨分寄孤衲不須田石秀徜徉坐雲深自在眠夢回明月上花影到牀邊石寒山多幽奇登者皆恆懾月照水澄澄風吹草獵獵凋梅雪作花杌木雲充葉觸雨轉鮮靈非晴不可涉寒城郭多是非林泉無畏懾遊魚不識網仁獸那知獵日出平地雲風吹滿山葉長憐巖徑幽杖屨歇復涉楚世情殊可哀山意不為懾林木作衣裳詩文當狩獵心閒如白雲身輕似紅葉猿鳥引吾前恣懷登且涉石有樹先林生計年逾一倍根遭陵谷變葉被風霜改咸笑外凋零不憐內文彩皮膚脫落盡唯有真實在寒山中好畬田種一收十倍地主既不常耕夫亦頻改泥沙得潤澤粟菽生光彩秋刈春復然青山鎮常在楚石樹生何代青青深幾倍堅貞雪不凋古徑霜難改玉幹老一枝瓊花新五彩光澤照無窮蔭覆天下在石寒山有裸蟲身白而頭黑手把兩卷書一道將一德住不安釜竈行不齎衣祴常持智慧劒擬破煩惱賊寒欲待黃河清難教白髮黑勞生如掣電努力在修德煮菜塞飢瘡織麻縫破裓心王寂不動降盡持刀賊楚遺吾青銅鏡圓圓兼白黑黑光鑑鬼心白色照人德文水織空囊菱花藏破裓開來識者稀能殺無明賊石有人畏白首不肯捨朱紱采藥空求仙根苗亂挑掘數年無效驗癡意瞋怫鬱獵師披袈裟元非汝使物寒死後書銘旌棺中具印紱多將異寶埋未免偷兒掘數者何冥冥思之轉鬱鬱勸君營葬時莫貯珍奇物楚斗笠薄峩冠草衣勝繡紱忘機事釣綸節用借耕掘傲骨既崚嶒雄心何怫鬱內直而外方筆下不容物石昔時可可貧今日最貧凍作事不諧和觸途成倥偬行泥屢腳屈坐社頻腹痛失卻斑猫兒老鼠圍飯瓮寒貧士養其親所憂飢與凍富人多酒肉賓客常倥偬富人安足誇貧士誠可痛所喜老瓦盆勝他金酒瓮楚酒肉朱門臭風霜寒士凍金戈一鬬爭紈褲彌倥偬財散下場空年衰孤影痛當時賓客儔誰復遺殘瓮石可貴天然物獨立無伴侶覓他不可見出入無門戶促之在方寸延之一切處你若不信受相逢不相遇寒青山與白雲可作高人侶風月兩無心時時到窗戶幾多塵外客未識幽深處自古優曇花無緣不能遇楚性情既寡合雲水遂成侶松柏為衣食石巖作牖戶意超非想時句到無言處次第四時花未開心已遇石余家有一窟窟中無一物淨潔空堂堂光華明日日蔬食養微軀布裘遮幻質任你千聖現我有天真佛寒無明煩惱窟中有最靈物含攝太虛空光明如皎日不隨生死輪何凝泡幻質往往錯安名非心亦非佛楚無生那有窟可死者何物夢破斷浮塵雲消見杲日晴霞照古文華露潤清質萬有交光明故曰心即佛石男兒大丈夫作事莫莽鹵徑挺鐵石心直趣菩提路邪路不用行行之枉辛苦不要求佛果識取心王主寒學道要分明勸君休莽鹵譬如適萬里復得還鄉路一旦造其居全拋跋涉苦升堂見本尊個是家中主楚海水煮成鹽鹽成又作鹵云何去者心忘卻來時路蝶夢忙為歡鳥聲頻話苦我人稟最靈安可不知主石間自訪高僧煙山萬萬層師親指歸路月掛一輪燈寒深山一個僧高臥白雲層解把爐中雪分為海底燈楚峰頂立孤僧下深雲萬層夜分紅日湧樹挂千輪燈石間遊華頂上天朗晝光輝四顧晴空裏白雲同鶴飛寒平生愛山水山水有清輝不獨還林鳥吾心亦倦飛楚秋山如錦畫雲物生餘輝倚杖看紅葉無聲共鳥飛石寒山有一宅宅中無欄隔六門左右通堂中見天碧房房虛索索東壁打西壁其中一物無免被人來惜寒到燒軟火飢來煮菜喫不學田舍翁廣置田莊宅盡作地獄業一入何會極好好善思量思量知軌則寒本有黃金宅光明了不隔春來花自紅雨過前山碧幸自開六戶何須安四壁空房我不居曠劫誰能惜任此一朽舍年深白蟻喫成時藉他緣壞亦非吾宅鼎鼎百年內行行冥數極誰為主人翁凡聖咸取則楚寒巖是故宅久與風塵隔繡石千尋高幽溪萬里碧白雲護柴扃青蘿生土壁聲消聞始歸色盡空猶惜摘葉作詩箋煮花當茶喫悠懷樹下居愍念火中宅落落效古賢超超悟玄極應身水月如化影無常則石儂家暫下山入到城隍裏逢見一羣女端正容貌美頭戴蜀樣花燕脂塗粉膩金釧鏤銀朵羅衣緋紅紫朱顏類神仙香帶氛氳氣時人皆顧盼癡愛染心意謂言世無雙魂影隨他去狗咬枯骨頭虛自舐脣齒不解返思量與畜何曾異今成白髮婆老陋若精魅無始由狗心不超解脫地寒婦女如畫瓶才觀知表裏中藏屎尿惡外假容顏美口吻流涎唾髻鬟堆垢膩面香只燕脂衣臭同齊紫巧把珠玉裝濃熏麝蘭氣徒迷俗子眼莫惑高人意轉盼顏色衰須臾光景去不肯斷淫心猶然誇皓齒死時若朽木未久蟲變異遠送向荒山遊魂作妖魅生前悟自性便入如來地楚偶來聚落間猶在深山裏有女如山花兩者誰稱美女子不自然偏著脂與膩山花發天妙本色開紅紫女子多豔情山花但清氣看女同看花莫生分別意癡人看女子心魂被鈎去不想西施冢蒼苔生皓齒何如山花落年年常不異以是鏡古今可辨狐與魅從此更超進已越諸十地石一自遁寒山養命餐山果平生何所憂此世隨緣過日月如逝川光陰石中火任你天地移我暢巖中坐寒只管徇塵緣何由成道果朱顏暗裏消白日忙中過古聖傳藥方教君免貪火將求安心法且去面壁坐楚一鉢隨時納澗毛兼野果花雲飄衣來天露送食過崖滴珍珠泉風吹石子火烹茶獨飲之靜與青山坐石我見世間人茫茫走路塵不知此中事將何為去津榮華能幾日眷屬片時親縱有千斤金不如林下貧寒大我須忘我居塵莫染塵有心皆作佛無路不通津語默空為座行藏道是親吾非憎濁富性本愛清貧楚空谷寂無人蒼崖不受塵蘭風石上拂松雨澗邊津聲靜詩偏瘦聞深道益親山花長富麗道者莫言貧石自聞梁朝日四依諸賢士寶志萬回師四仙傅大士顯揚一代教作持如來使建造僧伽藍信心歸佛理雖乃得如斯有為多患纍與道殊懸遠拆西補東爾不達無為功損多益少矣有聲而無形至今何處是寒我聞梁武帝起自一名士入相又為君尊賢復用士初迎栴檀像特遣黃華使達磨西天來臨朝談妙理真心本自明聖諦翻為纍即迷悟求之如反覆手爾此道尚儼然古人今亡矣欲明達磨心武帝迷者是楚晉唐佛法盛時亦多偉士近世法道衰豈無忠孝士名臣忍垢己僧作兵奴使更慨法中人財色兼為纍意態何所為不及庸人耳緬懷上古風我其苦守爾哀哉復哀哉斯道將已矣哀哉復哀哉法弊至于是石吁嗟貧復病為人絶友親甕裏長無飯甑中屢生塵篷庵不免雨漏榻劣容身莫怪今憔悴多愁定損人寒弟兄同造論無著與天親不料千年後空堆一屋塵寂寥師子吼孤負比邱身末世誰弘法靈山見佛人楚萬法不為侶于中誰更親坐消一頓飯勘破半微塵不識方真識忘身是大身寒雲沒花影無境亦無人石養女畏太多已生須訓誘捺頭遣小心鞭背令緘口未解乘機杼那堪事箕張婆語驢駒汝大不如母寒人間忤逆子善語難勸誘但苦爺娘心偏甜妻子口東鄰破糞箕西舍生苕不及鸚鵡兒能供盲父母楚引導二乘人化城方便誘豁開正法眼笑破虛空口日月兩芒鞋乾坤一敝靜看無極前萬物得其母石秉志不可卷須知我匪席浪造山林中獨臥磐陀石辨士來勸余速令受金璧鑿牆植蓬蒿若此非有益寒三四十年前吾家大叢席僧如無心雲座若不轉石今日多閉戶貪夫乃懷璧將來知興亡現在識損益楚古人為道切脅不沾牀席開田手荷鋤舂米腰墜石乾慧忽傾湫高操如執璧慚惶流俗師與法曾何益石以我棲遲處幽深難可論無風蘿自動不霧竹長昏澗水緣誰咽山雲忽自屯午時庵內坐始覺日頭暾寒山居無可說世事不須論栗色衣遮冷松明火照昏青黃林葉變黑白野雲屯半夜千峰頂開窗日已暾楚物情皆失所山事可深論清梵聲無際孤燈影不昏月從崖腳出雲向寺邊屯巖壑初開夢青松湧曉暾石憶昔過逢處人間逐勝遊樂山登萬仞愛水泛千舟送客琵琶谷攜琴鸚鵡洲焉知松樹下抱膝冷颼颼寒不覺成遺老猶能話舊遊千人同一帳萬里只孤舟北過黃龍塞南登白鷺洲頻遭風雪苦耳畔尚颼颼楚寒巖生異色時復坐而遊雲軟幻成海山深夢在舟神清低五嶽氣爽出三洲不必誇悲壯風沙塞草颼石報汝修道者進求虛勞神人有精靈物無字復無文呼時歷歷應隱處不居存叮嚀善保護勿令有點痕寒聰明長不昧隱見果何神似谷呼成響如波疊作文聖凡形盡壞今古理常存若向言中覓徒添鏡上痕楚至道識高遠幽操動鬼神行言須尚質道德必兼文風柳情無緒寒松志獨存將心涵皓月碧落見天痕石去年春鳥鳴此時思弟兄今年秋菊爛此時思發生緑水千場咽黃雲四面平哀哉百年內腸斷憶咸京寒拾得寒山弟寒山拾得兄從來無住處借問甚時生寒暑隨緣過乾坤似掌平何人知此意步步踏瑤京楚天地共根本聖賢皆弟兄史經雙眼活花鳥百端生君正邪多定人安亂自平寒巖憂未已愾我念神京石多少天台人不識寒山子莫知真意度喚作間言語寒甜桃不結實苦李偏生子昧卻祖師心隨他文字語楚春來草自生秋老花結子不用人力為天公各無語石一住寒山萬事休更無雜念掛心頭間於石壁題詩句任運還同不繫舟寒勸君了取自心休心了從他雪滿頭縱使染來仍舊白此身無異壑藏舟楚何事古人不肯休橫擔楖栗萬峰頭誰知逼塞虛空去卻笑藏舟有負舟石可惜百年屋左倒右復傾牆壁分散盡木植亂差橫甎瓦片片落朽爛不堪停任風吹驀塌再豎卒難成寒并上一株木藤纏枝已傾上有二鼠侵下有四蛇橫牛怒來觸之勢危難久停是身大患本道亦因他成楚名苑營臺閣未成勢已傾補東西又倒整下上將橫雪壓窗差脫風吹門不停無人掃三徑黃葉亂堆成石精神殊爽爽形貌極堂堂能射穿七札讀書覽五行經眠虎頭枕昔坐象牙牀若無阿堵物不啻冷如霜寒車馬填前巷笙歌咽後堂弟兄俱在座兒女儼成行稱意錢堆屋排頭笏滿牀黃金難贖命碧樹不禁霜楚富室日雕落難留一草堂明珠空有斛古木斷無行劍佩橫都市琴書散石牀回看門下士面冷半天霜石笑我田舍兒頭頰底墊濕巾子未曾高腰帶長時急非是不及時無錢趁不及一日有錢財浮圖頂上立寒登山頂不露入海腳不濕虛空量不大閃電光不急利劍斬不斷俊鷂趁不及一句絶思量石從空裏立楚草履石痕青繩衣山翠濕風喧花影狂人靜灘聲急飛鳥過無心行雲追不及澄懷玩物理嘗到溪頭立石買肉血𣽅𣽅買魚跳鱍鱍君身招罪纍妻子成快活捷死渠家去他人誰敢遏一朝如破牀兩個當頭脫寒提籃買魚蝦只揀鮮鱍鱍拋放池水間十可八九活斫肉血淋漓揮刀難止遏殺生養己命怨報何時脫楚呼狗狗頭顛刺魚魚尾鱍人心愛瀟灑物命貪生活如何殺不止而使善根遏譬汝坐囹圄寧無求早脫石千生萬死何時已生死來去轉迷情不識心中無價寶恰似盲驢信腳行寒人間那個無生死萬萬千千為識情提起金剛王寶劍卻來諸聖頂頭行楚前境本來清淨故如何後境起迷情當知真體無前後不向祖師行處行石心神用盡為名利百種貪婪進己軀浮生幻化如燈燼冢內埋身是有無寒愚人日日營財産百口團圝繞一軀眼下只誇今日有生前不信本來無楚澄清覺海忽生泡莫認浮漚是汝軀縱使馮夷鼓天浪馮夷歸息浪還無石世間何事最堪嗟盡是三塗造罪柤不學白雲巖下客一條寒衲是生涯秋到任他林葉落春來從你樹開花三界橫眠無一事明月清風是我家寒貪心不足可傷嗟鳳髓龍肝更吐柤歷歷心珠能返照茫茫業海此為涯彎弓射落青天月信手拈來鐵樹花多少神通并妙用盡歸無事道人家楚志不榮華少怨嗟名言聲譽味如柤自從夢斷霞天月不復塵緣鏡水涯白氣浩吞無海岸青峰高出大蓮花尋常一日三回步沒個閒人到我家石客歎寒山子君詩無道理吾觀乎古人貧賤不為恥應之笑此言談何疏闊矣願君似今日錢是急事爾寒仰則觀天文俯則察地理無一事不知不知便為恥身從何處來昧者真疏矣向外馳求人虛生浪死爾楚住山實瀟灑不執尋常理衣葉亦成趣食松豈曰恥古人誠有之世味久疏矣好句生風泉嘯歌為樂爾石從生不往來至死無仁義言既有枝葉心懷便譣詖若其開小道緣此生大僞詐說造雲梯削之成棘刺寒如來所說法尚有不了義外道豈無書其言多譣詖太虛絶朕迹真性離雕僞灑掃菩提場拔除煩惱刺楚往聖倡微言後賢標大義末流遭亂離衆說歸淫詖不謂世風衰反疑人性僞我儕重有憂寓誨於嘲刺石一瓶鑄金成一瓶埏泥出二瓶任君看那個瓶牢實欲知瓶有二須知業非一將此驗生因修行在今日寒把鏡照自身自身從鏡出若離鏡即背若認身非實此鏡與此身不異復不一貪玩掌上珠蹉過天邊日楚磁瓶養小鵝漸大身難出鵝勿傷其命瓶無損其實破此必彼亡兩者不存一若要出活鵝先問做瓶日石丹丘回聳與雲齊空裏五峰遙望低雁塔高排出青嶂禪林古殿入虹霓風搖松葉赤城秀霧吐中巖仙路迷碧落千山萬仞見藤蘿相接次連溪寒層巒疊嶂勢難齊到頂方知世界低鬱密深林藏鳥獸蕭條古洞起雲霓縱橫徑路從何入來往遊人向此迷仙境重重遮不見漁舟錯怪武陵溪楚削出芙蓉天欲齊長空翠浪浴高低春朝華頂來青雪秋晚楓林帶紫霓漫道俗人遊不到縱教仙子過還迷石梁獨坐看飛瀑一滴沿流分萬溪石余見僧繇性希奇巧妙間生梁朝時饒邈虛空寫塵跡無因畫得志公師寒每愛天台景物奇奇花異卉發無時騰騰任運難拘束跨虎豐干是我師楚法運垂秋異出奇道人聽訟太傷時從今只合埋雲去敢曰寒山是我師石久住寒山凡幾秋獨吟歌曲絶無憂饑餐一粒伽陀藥心地調和倚石頭寒獨將瓶鉢度春秋喜本無心更有憂可信途中未歸客千呼萬喚不回頭楚眼前不識是何秋一笑黃花百不憂坐到忘形人境寂風吹桐葉響牀頭石衆星羅列夜深明巖點孤燈月未沈圓滿光華不磨瑩掛在青天是我心寒道果圓時五眼明日輪出後衆星沈奇哉快樂無憂佛只個逍遙自在心楚一室寒燈竹護深夢回鶴立影沈沈臥看月在高峰頂個是無為道者心石老病殘年百有餘面黃頭白好山居布裘擁質隨緣過豈羡人間巧樣模寒滿鉢持來飽有餘人間天上任君居從心印出凡和聖一悟真空脫舊模楚屈指今來四十餘草年水宿與山居舍舟擲釣黃蘆岸撥草瞻風見古模石推殘荒草廬其中煙火蔚借問羣小兒生來凡幾日門外有三車迎之不肯出飽食腹膨脝個是癡頑物寒山川險谷間藥草常豐蔚潤之以甘雨曝之以烈日根莖初不同花果亦異出誰知有用材本是無情物楚茅堂坐臥深胸次殊超蔚碧樹襯黃雲丹霞吐白日晚看村犢歸朝聽林樵出我亦採山花聊儲鉢中物石有身與無身是我復非我如此審思量遷延倚巖坐足間青草生頂上紅塵墮已見俗中人靈牀施酒果寒在昔有幽人自言吾喪我我今亦喪吾隱几軒中坐雲散碧天高風來黃葉墮泠然水一杯旋摘枝頭果楚不問今何日安知人與我悠悠雲外想兀兀巖中坐新竹葉方舒深松子正墮頓令心地清句裏超因果石昨見河邊樹摧殘不可論二三餘蘂卉千萬斧刀痕霜剝萎黃葉波衝枯朽根生處當如此何用怨乾坤寒每見高明士難將毀譽論燒天徒費力斫水不成痕舌是興亡本心為禍福根萬般皆自造誰謂屬乾坤楚聞有曲轅樹蔽牛安足論百圍橫幹影千仞見枝痕匠伯不為顧斧斤寧及根安能如散木朽廢在乾坤石千年石上古人蹤萬丈巖前一點空明月照時常皎潔不勞尋討問西東寒孤雲出沒了無蹤昧者何曾達本空現前不費纖毫力日出西方夜落東楚虎頭戴角漫追蹤舌上蓮花透碧空莫問西天十萬隔即今移置娑婆東石憐底衆生病餐嘗略不厭蒸豚搵蒜醬炙鴨點椒鹽去骨鮮魚鱠兼皮熟肉臉不知他命苦只取自家甜寒持齊猶不足茹素太無厭就筍煨糠火生葱拌食鹽同魚作臠麩借肉為臉妄想沈生死都因為口甜楚安閒便是福淡薄未曾厭舌靜不思醬山深那得鹽煮花誇肉膾烹筍勝魚臉睥睨刀尖死只為口頭甜石讀書豈免死讀書豈免貧何以好識字識字勝他人丈夫不識字何處可安身黃連搵蒜醬忘計是苦辛寒個個貪生富家家怕死貧偏盲識字眼不喜讀書人玉帛能招禍文章好飾身然臍郿塢日何止一酸辛楚讀書可不死讀書可忘貧至若不讀書便是貧死人能達孔聖意即是如來身不悟兩家旨讀書徒苦辛石我見謾人漢如籃盛水走一氣將歸家籃裏何曾有我見被人謾一似園中韭日日被刀傷天生還自有寒將瓶貯虛空繞四天下走貯處空不少瀉時空不有神識空一無妄想著如韭出釜而入腸到頭何所有楚衲袖貯朝雲雲氣隨我走歸布尺宅中斯須復何有吾心似明月并照山中韭帝釋王都間光輝無不有石寒山頂上月輪孤照見晴空一物無可貴天然無價寶埋在五陰溺身軀寒此身閒逐片雲孤明月清風何處無盡大地人教作佛一莖草上一金軀楚兩莫雙兮一莫狐鎮州道有趙州無天高雁影分南北交頸鴛鴦不露軀石或向前溪照碧流或向巖邊坐磐石心似孤雲無所依悠悠世事何須覓寒飢食山中一口松臥枕松根一拳石自己猶如陌路人誰能更向他家覓楚瘦骨終當埋白雲此心久已同巖石霜天月白露華濃切忌道人無處覓石我家本住在寒山石巖棲息離煩緣泯時萬象無痕跡舒處周流遍大千光影騰輝照心地無有一法當現前方知摩尼一顆珠解用無方處處圓寒近望台山接雁山道人住此絶攀緣身心契理無多少鏡像交輝有百千赫日雖高行嶺下恆沙不遠在窗前世間出世俱稱妙情與無情總入圓楚不住舟兮即住山山頭水面寄生緣詩題殘碣知存幾字化蒼龍不計千有想亦同明月上無心恰遇落花前夜分夢坐須彌頂日照中天分外圓石世人何事可吁嗟苦樂交煎勿底涯生死往來多少劫東西南北是誰家張王李趙權時姓六道三塗事似麻只為主人不了絶遂招遷謝逐迷邪寒茫茫苦海實堪嗟浩浩滄溟尚可涯須信有錢公子宅不如無事道人家鵲巢豈厭棲高樹毳衲何妨續斷麻聲色縱橫魔境擾一揮智劒斬羣邪楚無航業海古來嗟霧漲雲浮詎有涯自入山中為道者不隨世上做人家興來𨽾字閒書葉笑殺謀生亂績麻忽忽歲華驅我去晚年何以敵諸邪石余家本住在天台雲路煙深絶客來千仞巖巒深可遁萬重溪澗石樓臺樺巾木屐沿流步布裘藜杖繞山回自覺浮生幻化事逍遙快樂實奇哉寒四明咫尺是天台野鶴孤雲共往來水石參差連梵宇金銀璀璨接仙臺攀蘿挽葛登山頂解帶披裘曳履回長憶豐干與寒拾此中行坐儘優哉楚吳興南望即天台一道江波得得來日月高懸寒石頂風雲遙接國清臺丹丘碧海聲猶在木屐樺冠笑不回逸響於今非寂寞琦公而後屬誰哉石不見朝垂露日爍自消除人身亦如此閻浮是寄居慎莫因循過且令三毒祛菩提即煩惱盡令無有餘寒物換人皆老星移歲又除閻浮界上客閃電影中居一念從今悟羣昏自此祛了知心地藏無缺亦無餘楚原草春方長野燒寒復除物隨中氣換人得幾時居駒隙能無警狐疑貴自祛幡然今入道了了不知餘石水清澄澄瑩徹底自然見心中無一事萬境不能轉心既不妄起永劫無改變若能如是知是知無背面寒歷歷根境識堂堂佛知見本空不待掃元有何須轉得旨長快活臨機善通變舒開白玉毫突出黃金面楚欲契聖人心而當離所見隔窗花影搖高樹鶯聲轉美容易為衰靈臺不可變如何無相中菩薩夜叉面石說食終不飽說衣不免寒飽喫須是飯著衣方免寒不解審思量只道求佛難回心即是佛莫向外頭看寒熱則普天熱寒則普天寒欲免寒與熱何異熱與寒不信作佛易翻成行路難自家真面孔直待畫來看楚寒時勿太熱熱時無太寒忽寒又忽熱兼熱亦兼寒知此養生易迷此養生難司空顛倒讀譜牒向誰看石可畏輪回苦往復似翻塵蟻巡環未息六道亂紛紛改頭換面孔不離舊時人速了黑暗獄無令心性昏寒衆生不了悟曠劫徇根塵自性常空寂由來絶糾紛人生貪食獸獸死卻為人人獸更相食妨他業鏡昏楚欲畫空成色思揚水起塵雲山方作舞花雨自交紛紅藥如歌女青松可韻人清芬滿眼耳智鏡不為昏石可畏三界輪念念未曾息才始似出頭又卻遭沈溺假使非非想蓋緣多福力爭似識真源一得即永得寒哀哉三界苦可以一念息大旱渠不焦大浸渠不溺日月借輝光天人荷恩力真源竟何在無得無不得楚大士為有情慈悲未曾息從火而出火因溺而投溺以無身為身以無力為力了知生佛相度心不可得石昨日遊峰頂下窺千尺崖臨危一株樹風擺兩枝開雨飄即零落日曬作塵埃嗟見此茂秀今為一聚灰寒形山中有寶識海外無崖此日能詳審迷雲盡豁開一塵收大地六趣滅非埃化彼同成佛如將麥種灰楚看山須到頂學道如懸崖仰嘯目無礙高歌心自開夕陽虛過跡空翠絶飛埃翻憶劫前事寒冰火結灰石自古多少聖叮嚀教自信人根性不等高下有利鈍真佛不肯認置力枉受困不知清淨心便是法王印寒大家訓奴僕奴僕不肯信得利轉聰明失利恆遲鈍奴僕為利死大家因財困思量有限身總被無常印楚最後靈山事垂嗣以表信源流成遠迂法弊成頑鈍而見高尚士甘於林下困哀哉斷索禪妄受冬瓜印石我聞天台山山中有琪樹永言欲攀上莫繞石橋路緣此生悲歎幸居將己慕今日觀鏡中颯颯鬢垂素寒是身如浮雲又比臨崖樹雲散歸虛空樹摧橫道路死生達其源聲色非所慕學道貴從師師資傳有素楚香嚴曾立言口咬一枝樹手足不相攀有人問道路答之喪厥身否則負所慕萬竹吼千山梅花影自素石養子不經師不及都亭鼠何曾見好人豈聞長者語為染在薰蕕應須擇朋侶五月販鮮魚莫教人笑汝寒正念快猫兒邪心飢老鼠縱鼠不養猫斯人難與語併將猫鼠逐善惡俱無侶汝即是如來如來即是汝楚爭看捕猫兒角尖入老鼠猫口生流涎鼠驚不敢語猫兒假小心相與稱道侶鼠子出角時這回不放汝石徒閉蓬門坐頻經歲月遷唯聞人作鬼不見鶴成仙念此那堪說隨緣須自憐回瞻郊郭外古墓犁為田寒不見虛空壞徒傷岸谷遷有情皆肉段無漏乃金仙省去終由己迷來實可憐但令心作佛何慮海為田楚世亂少完璧人情多變遷有山難隱士無地可留仙兵火何其慘民情甚可憐道人一鉢在何處問原田石時人見寒山各謂是風顛貌不起人目身唯布裘纏我語他不會他語我不言為報往來者可來向寒山寒聚財能作祟貪酒遂成顛為女將身縛如蠶被繭纏轉添三毒盛翻怪六親言未死常遭病魂靈在泰山楚野性時違俗人因號我顛閒身荒寺寄破衲斷雲纏面壁竟無語看花或有言吁嗟名利客幾個問寒山石自在白雲間從來非買山下危須策杖上險捉藤攀澗畔松常翠溪邊石自斑友朋雖阻絶春至鳥關關寒自我得身間彌年不下山雲深同鶴住果熟共猿攀最愛千峰碧從教兩鬢斑絶無名與利誰肯扣松關楚賦性樂幽間相宜惟在山有詩懶琢削無事絶躋攀任爾物華改隨渠僧臘斑柴門雲自護雖設未曾關石我在村中住衆推無比方昨日到城下仍被狗形相或嫌袴太窄或說衫少長撐卻鷂子眼雀兒舞堂堂寒各有隨身影驅馳走四方幾回閒辨譿何處細端相遠近燈肥瘦高低月短長不知圓寂夜誰在涅槃堂楚奔馳哀底事黽勉紀遐方道自鳶魚察心為金玉相竹房松火暖瓦竈茗煙長淡泊得山味清風來草堂石死生元有命富貴本由天此是古人語吾今非謬傳聰明每短命癡騃卻長年鈍物豐財寶惺惺漢無錢寒休學外道法莫貪長壽天如同地獄住此是佛經傳頓悟無生理方為不死年若論因與果來往似翻錢楚參禪趁色力出路問晴天酌古非虛語傷今自失傳謀生強壯日悔過死亡年枉復有家計閻王不要錢石國以人為本猶如樹因地地厚樹扶疏地薄樹憔悴不得露其根枝枯子先墜決陂以取魚是求一期利寒為王贍部洲多住歡喜地善報得富樂生民免憔悴法輪轉其中佛力無所墜若比三洲人此方根獨利楚觀樹獨經行乃思持心地本根培植深枝幹無憔悴露潤花修容霜侵葉不墜垂陰如淨居幽廠快風利石衆生不可說何意許顛邪面上兩惡鳥心中三毒蛇是渠作障礙使你事煩拏高舉手彈指南無佛陀耶寒無心邪即正有念正成邪識似瓶中雀身如篋內蛇了然知幻夢從此息紛拏盡斬為三段當陽按莫耶楚誦詩三百篇所貴思無邪求友皆鳴鳥于京兆夢蛇正聲尚和雅真氣任騰拏仰止聖王意宮牆長昔耶石自樂平生道煙蘿石洞間野情多放曠長伴白雲閒有路不通世無心孰可攀石牀孤夜坐圓月上寒山寒青松千萬樹白屋兩三間在世人人為僧日日閒貪心多苦惱俗事莫追攀幸可供齊鉢秋來芋滿山楚曠志乾坤外棲心泉石間雲蒸土竈冷風韻樹瓢閒野果吾先摘好花仙未攀奇哉可笑事夢想不離山石大海水無邊魚龍萬萬千遞互相食噉癡肉團為心不了絶妄想起如煙性月澄澄朗廓爾照無邊寒佛滅幾經年如今倏二千誰明乾屎橛總似爛泥團說法人成市當陽口吐煙身登師子座心在野狐邊楚說法何多口